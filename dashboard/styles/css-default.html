<style type="text/tailwindcss">
    body.menu {
        font-family: 'Manrope', sans-serif;
        background: radial-gradient(circle at center, #f8fafc 0%, #f1f5f9 100%);
    }

    body.dark.menu{
        background: radial-gradient(circle at center, #1c1917 0%, #0c0a09 100%);
    }

    .donut-chart { 
        background: conic-gradient( 
        #f97316 0% 0%, 
        #14b8a6 0% 0%, 
        #f59e0b 0% 0%, 
        #cbd5e1 0% 100% 
        ); 
        border-radius: 50%;
    }

    /* Typing animation */
    .isTyping::after {
        content: '';
        display: inline-flex;
        gap: 3px;
        width: 28px;
        height: 10px;
        background-image: 
            radial-gradient(circle, currentColor 2px, transparent 2px),
            radial-gradient(circle, currentColor 2px, transparent 2px),
            radial-gradient(circle, currentColor 2px, transparent 2px);
        background-size: 6px 6px;
        background-position: 0 center, 10px center, 20px center;
        background-repeat: no-repeat;
        animation: typing-dots 1.2s infinite ease-in-out;
        vertical-align: middle;
        margin-left: 2px;
    }

    @keyframes typing-dots {
        0%, 100% {
            background-image: 
                radial-gradient(circle, currentColor 2px, transparent 2px),
                radial-gradient(circle, color-mix(in srgb, currentColor 30%, transparent) 2px, transparent 2px),
                radial-gradient(circle, color-mix(in srgb, currentColor 30%, transparent) 2px, transparent 2px);
        }
        33% {
            background-image: 
                radial-gradient(circle, color-mix(in srgb, currentColor 30%, transparent) 2px, transparent 2px),
                radial-gradient(circle, currentColor 2px, transparent 2px),
                radial-gradient(circle, color-mix(in srgb, currentColor 30%, transparent) 2px, transparent 2px);
        }
        66% {
            background-image: 
                radial-gradient(circle, color-mix(in srgb, currentColor 30%, transparent) 2px, transparent 2px),
                radial-gradient(circle, color-mix(in srgb, currentColor 30%, transparent) 2px, transparent 2px),
                radial-gradient(circle, currentColor 2px, transparent 2px);
        }
    }

    .glass-card {
        background: rgba(240, 240, 240, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(240, 240, 240, 0.5);
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.15), 0 2px 4px -2px rgb(0 0 0 / 0.15);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card:hover {
        background: rgba(230, 230, 230, 0.9);
        transform: translateY(-8px);
        border-color: rgba(230, 230, 230, 0.8);
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }
    .dark .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .dark .glass-card:hover {
        background: rgba(255, 255, 255, 0.06);
        transform: translateY(-8px);
        border-color: rgba(255, 255, 255, 0.2);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .active-row {
        background-color: rgba(255, 219, 205, 0.3);
    }

    /* AI css */
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
    .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); }
    </style>
