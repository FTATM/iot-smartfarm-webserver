<!-- JavaScript -->
<script>
    let isLoading = true;
    let tables = [
        {
            'id': 'newTable_1',
            'name': null,
            'label': null,
            'branch_id': 1,
            'table_type_id': null,
            'child_of_table_id': null,
            'rows': [{
                'd_id': 'newrow_1',
                'd_name_table_id': 'newTable_1',
                'd_start_day': 0,
                'd_end_day': 0,
                'd_value': null,
                'd_second_label': null,
                'd_row_parent_id': null
            }
            ]
        }
    ];
    let table_m = [];
    let table_c = [];
    let table = [];
    let childen = [];

    // Adjust font sizes based on screen width
    document.addEventListener('DOMContentLoaded', async () => {

        initDataTable();

        isLoading = false;
    });
    async function fetchs() {
        let f = new FormData();

        let res = await fetch("../../api-website/fetch-tableknowledge.php");
        let raw = await res.json();
        let data = raw['data'] ?? [];
        console.log(data);
        tables = data;
    }

    async function process() {

    }

    function initDataTable() {
        if (!tables) {
            console.warn("Sorry, Not found tables. Please check data from database.");
            return;
        }

        table_m = tables.filter((t) => t.child_of_table_id == null);
        table_c = tables.filter((t) => t.child_of_table_id != null);

        console.log(table_m);
        console.log(table_c);


        table = table_m[0];
        childen = table_c;

        Table();
    }

    function Table() {
        let tableE = document.getElementById("table");
        if (!tableE) {
            console.warn("Sorry, Not found Element table. Please contact administrator.");
            return;
        }
        let thead = tableE.querySelector('thead');
        if (!thead) {
            thead = document.createElement('thead');
        }
        thead.innerHTML = '';

        let tr = document.createElement('tr');
        tr.innerHTML = `
            <th>วัน</th>
            <th>
                <input 
                class="border p-1 rounded w-full text-center"
                value="${table.label ?? ''}" 
                data-id='${table.id}'
                data-field="label-table"
                >
            </th>
        `;

        childen.forEach(c => {
            tr.innerHTML += `
            <th>
                <input 
                class="border p-1 rounded w-full text-center"
                value="${c.label ?? ''}"
                data-id='${c.id}'
                data-field="label-table"
                >
            </th>`;
        });


        let btnAddColumn = document.createElement('th');
        btnAddColumn.innerHTML = ' <button class="w-10 h-10 flex items-center justify-center rounded-full bg-blue-300 hover:bg-blue-400 text-white text-xl shadow"> + </button>';
        btnAddColumn.onclick = () => addColumn();
        tr.appendChild(btnAddColumn);

        thead.appendChild(tr);


        let tbody = tableE.querySelector('tbody');
        if (!tbody) {
            tbody = document.createElement('tbody');
        }
        tbody.innerHTML = '';


        let rows = table['rows'];

        Object.values(rows).forEach(r => {
            let tr = document.createElement('tr');

            // 🟡 column แรก (ช่วงวัน)
            let tdDate = document.createElement('td');

            tdDate.innerHTML = `
            <input 
                type="number" 
                class="border p-1 rounded w-[40%] max-w-[5vw]"
                value="${r.d_start_day}"
                data-id="${r.d_id}"
                data-table_id="${r?.d_name_table_id}"
                data-field="start_day"
            > - 
            <input 
                type="number" 
                class="border p-1 rounded w-[40%] max-w-[5vw]"
                value="${r.d_end_day}"
                data-id="${r.d_id}"
                data-table_id="${r?.d_name_table_id}"
                data-field="end_day"
            >
        `;
            tr.appendChild(tdDate);

            // 🟡 column value หลัก
            let tdValue = document.createElement('td');
            tdValue.innerHTML = `
            <input 
                class="border p-1 rounded w-full text-center"
                value="${r.d_value ?? ''}"
                data-id="${r.d_id}"
                data-table_id="${r?.d_name_table_id}"
                data-field="main_value"
            >
        `;
            tr.appendChild(tdValue);

            // 🟡 child columns
            Object.values(childen).forEach(c => {
                let td = document.createElement('td');

                let found = c['rows'].find(d => d.d_row_parent_id == r.d_id);

                td.innerHTML = `
                <input 
                    class="border p-1 rounded w-full text-center"
                    value="${found?.d_value ?? ''}"
                    data-parent="${r.d_id}"
                    data-id="${found?.d_id}"
                    data-table_id="${found?.d_name_table_id}"
                    data-child="${c.id ?? ''}"
                    data-field="child_value"
                >
                `;
                tr.appendChild(td);
            });

            tbody.appendChild(tr);
        });

        tableE.appendChild(thead);
        tableE.appendChild(tbody);
    }

    function collectData() {
        let inputs = document.querySelectorAll("#table input");

        let result = [];

        inputs.forEach(input => {
            result.push({
                id: input.dataset.id,
                parent: input.dataset.parent,
                table_id: input.dataset.table_id,
                field: input.dataset.field,
                value: input.value
            });
        });

        return result;
    }

    function buildAllTables(result, table, children) {

        const mainMap = {};

        // 1. เก็บ main data
        result.forEach(r => {
            if (r.table_id === table.id) {
                if (!mainMap[r.id]) mainMap[r.id] = {};
                mainMap[r.id][r.field] = r.value;
            }
        });

        // 2. สร้าง table list (main + children)
        const allTables = [
            {
                ...table,
                rows: []
            },
            ...children.map(c => ({
                ...c,
                rows: []
            }))
        ];

        // 3. map table_id → table object
        const tableMap = {};
        allTables.forEach(t => {
            tableMap[t.id] = t;
        });

        // 4. ใส่ข้อมูล main rows
        Object.entries(mainMap).forEach(([id, data]) => {
            tableMap[table.id].rows.push({
                d_id: id,
                d_name_table_id: table.id,
                d_row_parent_id: null,
                d_start_day: data.start_day || null,
                d_end_day: data.end_day || null,
                d_value: data.main_value || null,
                d_second_label: null
            });
        });

        // 5. ใส่ข้อมูล children rows
        result.forEach(r => {
            if (r.table_id !== table.id && r.parent) {

                const t = tableMap[r.table_id];
                const parent = mainMap[r.parent];

                if (!t || !parent) return;

                t.rows.push({
                    d_id: r.id,
                    d_name_table_id: r.table_id,
                    d_row_parent_id: r.parent,
                    d_start_day: parent.start_day || null,
                    d_end_day: parent.end_day || null,
                    d_value: r.value,
                    d_second_label: null
                });
            }
        });

        // 6. sort ทุก table ตามวัน
        allTables.forEach(t => {
            t.rows.sort((a, b) => (a.d_start_day || 0) - (b.d_start_day || 0));
        });

        return allTables;
    }

    function addColumn() {
        console.log('add column');

        let result = collectData();
        console.log(result);
        // result = transformData(result);
        // let newChildren = bindDataToChildren(result, table, childen);
        // console.log(newChildren);
        let all = buildAllTables(result, table, childen);
        console.log(all);
        const count = tables.length ?? 0;
        const rows_len = table.rows ?? 0;
        const newTable_id = 'newTable_' + (count + 1);

        list_rows = table.rows.map((r, index) => {
            const newrow_id = 'newrow_' + r.id + "_" + index;
            return {
                'd_id': newrow_id,
                'd_name_table_id': newTable_id,
                'd_start_day': r.start_day,
                'd_end_day': r.end_day,
                'd_value': null,
                'd_second_label': null,
                'd_row_parent_id': r.id
            }
        });

        tables.push({
            'id': newTable_id,
            'name': null,
            'label': null,
            'branch_id': 1,
            'table_type_id': null,
            'child_of_table_id': table.id,
            'rows': list_rows
        })

        initDataTable();
    }



    // =============== Switch Mode ================

    function ModalConfirmEditTable() {
        openModal(
            "ยืนยันการแก้ไข",
            "คุณต้องการแก้ไขข้อมูลนี้ใช่หรือไม่?",
            confirmEdit,
            "bg-yellow-500 hover:bg-yellow-600"
        );
    }

    function ModalConfirmDeleteTable() {
        openModal(
            "ยืนยันการลบ",
            "คุณต้องการลบข้อมูลนี้ใช่หรือไม่?",
            confirmDelete,
            "bg-red-500 hover:bg-red-600"
        );
    }

    function ModalConfirmSaveTable() {
        openModal(
            "ยืนยันการบันทึก",
            "คุณต้องการบันทึกข้อมูลนี้ใช่หรือไม่?",
            confirmSave,
            "bg-lime-500 hover:bg-lime-400"
        );
    }

    function ModalConfirmCancelTable() {
        openModal(
            "ยืนยันการยกเลิก",
            "คุณต้องการยกเลิกการแก้ไขนี้ใช่หรือไม่?",
            confirmCancel,
            "bg-stone-500 hover:bg-stone-600"
        );
    }

    function confirmEdit() {
        console.log("Confirm Edit");
        Table();
        let _cancel = document.getElementById('cancel-table');
        let _save = document.getElementById('save-table');
        let _edit = document.getElementById('edit-table');
        let _delete = document.getElementById('delete-table');
        _cancel.classList.remove('hidden');
        _save.classList.remove('hidden');
        _edit.classList.add('hidden');
        _delete.classList.add('hidden');
    }

    function confirmDelete() {
        console.log("Confirm Delete");
    }

    function confirmSave() {
        console.log("Confirm Save");
        let result = collectData();
        console.log(result);
        // result = transformData(result);
        // let newChildren = bindDataToChildren(result, table, childen);
        // console.log(newChildren);
        let all = buildAllTables(result, table, childen);
        console.log(all);

        confirmCancel();
    }

    function confirmCancel() {
        let _cancel = document.getElementById('cancel-table');
        let _save = document.getElementById('save-table');
        let _edit = document.getElementById('edit-table');
        let _delete = document.getElementById('delete-table');
        if (!_cancel.classList.contains('hidden')) {
            initTable(table, childen);
            mapTable(table, childen);
            _cancel.classList.add('hidden');
            _save.classList.add('hidden');
            _edit.classList.remove('hidden');
            _delete.classList.remove('hidden');
        }
    }


    // ============ Modal ===========
    let currentAction = null;

    function openModal(title, desc, action, colorClass) {
        document.getElementById("confirmModal").classList.remove("hidden");
        document.getElementById("confirmModal").classList.add("flex");

        document.getElementById("modalTitle").innerText = title;
        document.getElementById("modalDesc").innerText = desc;

        const btn = document.getElementById("confirmBtn");
        btn.className = `px-4 py-2 rounded text-white ${colorClass}`;

        currentAction = action;
    }

    function closeModal() {
        document.getElementById("confirmModal").classList.add("hidden");
        document.getElementById("confirmModal").classList.remove("flex");
    }

    document.getElementById("confirmBtn").onclick = function () {
        if (currentAction) currentAction();
        closeModal();
    };
</script>
