  function redirectTo(page, path = "") {

  function getStatusByKey(key, v, min, max) {
    if (v >= min && v <= max) return { text: "ดีที่สุด", type: "success" };
    if (v > max) return { text: "เหมาะสม", type: "success" };
    if (v >= min && v <= max) return { text: "ไม่ดี", type: "warning" };
    return { text: "อันตราย", type: "danger" };
  }

  function setBadge(statusEl, text, type) {
    const map = {
      success:
        "status px-2 py-0.5 rounded-full bg-green-100 dark:bg-green-900 text-green-600 dark:text-green-400 text-[0.75vw] font-bold uppercase",
      warning:

      danger:

      info: "status px-2 py-0.5 rounded-full bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-400 text-[0.75vw] font-bold uppercase",
      na: "status px-2 py-0.5 rounded-full bg-stone-100 dark:bg-stone-900 text-stone-500 dark:text-stone-400 text-[0.75vw] font-bold uppercase",
      orange:
        "status px-2 py-0.5 rounded-full bg-orange-100 dark:bg-orange-900 text-orange-700-400 dark:text text-[0.75vw] font-bold uppercase",
    };

    statusEl.textContent = text;

  function setCardValue(key, value, min, max) {
    const card = document.getElementById(`card-${key}`);
    console.log(card);
    if (!card) return;

    
    const valueEl = card.querySelector(".value");
    const statusEl = card.querySelector(".status");

    if (value === null || value === undefined || isNaN(value)) {
      valueEl.textContent = "--";
      setBadge(statusEl, "N/A", "na");
      return;
    }

    const v = Number(value);

    valueEl.textContent = v.toLocaleString("en-US", {
      minimumFractionDigits: 0,
      maximumFractionDigits: 2,
    });

    const st = getStatusByKey(key, v, min, max);
    setBadge(statusEl, st.text, st.type);

    updateMetricBar(key, v);
  }

  //=============== Bar Process ==================

  function initMetricBars() {
    document.querySelectorAll(".metric-range").forEach((wrap) => {
      const key = wrap.dataset.key;
      const min = wrap.dataset.min;
      const max = wrap.dataset.max;
      // const cfg = BAR_CONFIG[key];

      wrap.classList.remove("hidden");

      const left = wrap.querySelector(".label-left");
      const right = wrap.querySelector(".label-right");
      left.textContent = min || "";
      right.textContent = max || "";
      left.style.color = "#C73434";
      right.style.color = "#198754";

      const fill = wrap.querySelector(".fill");
      if (fill) fill.style.clipPath = "inset(0 100% 0 0)";
    });
  }

  function updateMetricBar(key, value) {
    // const cfg = BAR_CONFIG[key];
    // if (!cfg) return;

    const wrap = document.querySelector(`.metric-range[data-key="${key}"]`);
    if (!wrap) return;

    const min = wrap.dataset.min;
    const max = wrap.dataset.max;

    const fill = wrap.querySelector(".fill");

    if (value === null || value === undefined || isNaN(value)) {
      if (fill) fill.style.clipPath = "inset(0 100% 0 0)";
      return;
    }

    const v = Number(value);
    const pct = ((v - min) / (max - min)) * 100;
    const safePct = clamp(pct, 0, 100);

    if (fill) {
      // fill.style.clipPath = `inset(0 ${100 - safePct}% 0 0)`;
      fill.style.clipPath = `inset(0 50% 0 0)`;
    }
  }

  //=============== Function Calc ==================
  function clamp(n, min, max) {
    return Math.max(min, Math.min(max, n));
  }

  function toNumber(v) {
    const n = parseFloat(v);
    return Number.isFinite(n) ? n : 0;
  }

  // function formatNumber(n) {
  //     return (Number.isFinite(n) ? n : 0).toFixed(1);

  function formatNumber(num) {
    return new Intl.NumberFormat("en-US").format(num);
  }

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function Min(list) {
    if (!Array.isArray(list)) return 0;
    let min = Math.min(list);
    return min;
  }

  function Max(list) {
    if (!Array.isArray(list)) return 0;
    let max = Math.max(list);
    return max;
  }

  function Avg(list) {
    if (!Array.isArray(list)) return 0;
    const avg = (Sum(list) / list.length).toFixed(2);
    return avg;
  }

  function Sum(list) {
    if (!Array.isArray(list)) return 0;
    let sum = 0;
    list.forEach((v) => {
      sum += v;
    });
    return sum;
  }

  async function calculateElectricityAndWater(CardId) {
    let sensor_Name = "";
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const day = String(now.getDate()).padStart(2, "0");
    const formattedDate = `${year}-${month}-${day} 00:00:00`;

    try {
      sensor_Name = "electricity";
      const resel = await fetch(
        "../../api-website/fetch_specifiedByName.php?name=" +
        sensor_Name +
        "&start_time=" +
        formattedDate,
      );
      const rawel = await resel.json();
      const datael = rawel["data"];
      const elecUnit = parseFloat(datael[0]["diff"]?.toString()) ?? 0;
      const electric = isNaN(elecUnit) ? 0 : elecUnit * electric_unit;

      SetValueInHTMLById(CardId + "-electricity-usage", electric.toFixed(2));

      sensor_Name = "water";
      const reswa = await fetch(
        "../../api-website/fetch_specifiedByName.php?name=" +
        sensor_Name +
        "&start_time=" +
        formattedDate,
      );
      const rawwa = await reswa.json();
      const datawa = rawwa["data"];
      const waterUnit = parseFloat(datawa[0]["diff"]?.toString()) ?? 0;

      const water = isNaN(waterUnit) ? 0 : waterUnit * water_unit;

      SetValueInHTMLById(CardId + "-water-usage", water.toFixed(2));
    } catch (err) {
      console.error("❌ loadSensorData error:", err);
    }
  }

  async function loadGraphMarketById() {
    const table_type = 6;
    const loading = document.getElementById("price-loading");
    const typeContainer = document.getElementById("types-MarketChart");

    try {
      const res = await fetch(
        "../../api-website/fetch_tableByTypeId.php?typeId=" + table_type,
      );
      const raw = await res.json();
      const tables = raw.data;

      if (!tables || typeof tables !== "object") {
        renderMarketPriceChart([], []);
        return;
      }

      // 1️⃣ หา table หลัก
      const mainTable = Object.values(tables).find((t) => !t.child_of_table_id);
      if (!mainTable) return;

      // 2️⃣ เรียง X-axis แบบ numeric
      const labels = mainTable.children
        .map((row) => row.end_day)
        .sort((a, b) => Number(a) - Number(b));

      // 3️⃣ หา table ลูก
      const childTables = Object.values(tables).filter(
        (t) => t.child_of_table_id === mainTable.id,
      );

      // 4️⃣ สร้าง full dataset
      fullDatasets = childTables.map((table, index) => {
        const dataMap = {};
        table.children.forEach((row) => {
          dataMap[row.end_day] = Number(row.value);
        });

        return {
          label: table.label,
          data: labels.map((day) => dataMap[day] ?? null),
          borderWidth: 2,
          fill: false,
          spanGaps: true,
          tension: 0.3,
          pointRadius: screenWidth >= 3840 ? 5 : 2,
        };
      });

      // 5️⃣ สร้างปุ่มเฉพาะครั้งแรกเท่านั้น
      if (!filterInitialized) {
        typeContainer.innerHTML = "";

        childTables.forEach((table) => {
          const btn = document.createElement("button");
          btn.textContent = table.label;

          btn.className = `
            px-3 py-1 rounded-lg border text-[0.5vw]
            border-stone-300 bg-white text-stone-600
            hover:bg-orange-50 hover:border-orange-400
            transition-all duration-200
        `;

          btn.addEventListener("click", () => {
            if (selectedTypes.has(table.label)) {
              selectedTypes.delete(table.label);
              btn.classList.remove(
                "bg-orange-500",
                "text-white",
                "border-orange-500",
              );
            } else {
              selectedTypes.add(table.label);
              btn.classList.add(
                "bg-orange-500",
                "text-white",
                "border-orange-500",
              );
            }

            updateChart(labels);
          });

          typeContainer.appendChild(btn);
        });

        filterInitialized = true;
      }

      // 6️⃣ update chart (ใช้ selectedTypes เดิม)
      updateChart(labels);
    } catch (err) {
      console.error("❌ price trend error:", err);
    } finally {
      if (loading) loading.classList.add("hidden");
    }
  }

  function updateChart(labels) {
    let filtered;

    if (selectedTypes.size === 0) {
      filtered = fullDatasets;
    } else {
      filtered = fullDatasets.filter((d) => selectedTypes.has(d.label));
    }

    const allValues = filtered.flatMap((d) => d.data).filter((v) => v !== null);

    let min = Math.min(...allValues);
    let max = Math.max(...allValues);

    min -= min * 0.05;
    max += max * 0.05;

    if (!trendChart) {
      renderMarketPriceChart(labels, filtered, min, max);
    } else {
      trendChart.data.labels = labels;
      trendChart.data.datasets = filtered;
      trendChart.options.scales.y.min = min;
      trendChart.options.scales.y.max = max;
      trendChart.update("none");
    }
  }

  function renderMarketPriceChart(labels, datasets, min = 0, max = 1) {
    const ctx = document.getElementById("marketPriceChart");
    if (!ctx) return;

    trendChart = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets,
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (ctx) => ` ${ctx.raw} ฿`,
            },
          },
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: {
              font: { size: fontSize },
              color: "#78716c",
            },
          },
          y: {
            min,
            max,
            ticks: {
              font: { size: fontSize },
              color: "#78716c",
              callback: (v) => Number(v).toFixed(1) + " ฿",
            },
          },
        },
      },
    });
  }

  function toggleDarkMode() {
    const isDark = document.documentElement.classList.toggle("dark");
    document.documentElement.classList.toggle("light", !isDark);
    document.getElementById("icon-moon").style.display = isDark
      ? "none"
      : "inline";
    document.getElementById("icon-sun").style.display = isDark
      ? "inline"
      : "none";
    document.getElementById("mode-label").textContent = isDark
      ? "Light"
      : "Dark";
    localStorage.setItem("theme", isDark ? "dark" : "light");
  }

  /* โหลด preference จาก localStorage เมื่อเปิดหน้า */
  (function () {
    const saved = localStorage.getItem("theme");
    if (saved === "dark") {
      document.documentElement.classList.add("dark");
      document.documentElement.classList.remove("light");
      const moon = document.getElementById("icon-moon");
      const sun = document.getElementById("icon-sun");
      const label = document.getElementById("mode-label");
      if (moon) moon.style.display = "none";
      if (sun) sun.style.display = "inline";
      if (label) label.textContent = "Light";
    }
  })();

  async function loadPieGraph() {
    // const data = [40, 30, 15, 15];
    const res = await fetch("../../api-website/fetch_expenses.php");
    const raw = await res.json();
    const data = raw["data"];

    const categoryMap = {};
    data.forEach((item) => {
      if (!categoryMap[item.category_id]) {
        categoryMap[item.category_id] = 0;
      }
      categoryMap[item.category_id] += Number(item.amount);
    });

    const sorted = Object.entries(categoryMap).sort((a, b) => b[1] - a[1]);

    const total = sorted.reduce((sum, c) => sum + c[1], 0);

    let current = 0;

    const gradient = sorted
      .map((item, index) => {
        const categoryId = item[0];
        const amount = item[1];
        const percent = parseFloat(((amount / total) * 100).toFixed(1));

        const start = current;
        const end = current + percent;
        current = end;
        return `${colors[index]} ${start}% ${end}%`;
      })
      .join(", ");

    let donut = document.getElementById("donut");
    donut.style.background = `conic-gradient(${gradient})`;

    SetValueInHTMLById("card-4-total", total);
  }
