  function getStatusByKey(key, v, min, max) {
    if (v >= min && v <= max) return { text: "ดีที่สุด", type: "success" };
    if (v > max) return { text: "เหมาะสม", type: "success" };
    if (v >= min && v <= max) return { text: "ไม่ดี", type: "warning" };
    return { text: "อันตราย", type: "danger" };
  }

  function setCardValue(key, value, min, max) {
    const card = document.getElementById(`card-${key}`);
    if (!card) return;


    const valueEl = card.querySelector(".value");
    const statusEl = card.querySelector(".status");

    if (value === null || value === undefined || isNaN(value)) {
      valueEl.textContent = "--";
      setBadge(statusEl, "N/A", "na");
      return;
    }

    const v = Number(value);

    valueEl.textContent = v.toLocaleString("en-US", {
      minimumFractionDigits: 0,
      maximumFractionDigits: 2,
    });

    const st = getStatusByKey(key, v, min, max);
    setBadge(statusEl, st.text, st.type);

    updateMetricBar(key, v);
  }

  //=============== Bar Process ==================

  function initMetricBars() {
    document.querySelectorAll(".metric-range").forEach((wrap) => {
      const key = wrap.dataset.key;
      const min = wrap.dataset.min;
      const max = wrap.dataset.max;
      // const cfg = BAR_CONFIG[key];

      wrap.classList.remove("hidden");

      const left = wrap.querySelector(".label-left");
      const right = wrap.querySelector(".label-right");
      left.textContent = min || "";
      right.textContent = max || "";
      left.style.color = "#C73434";
      right.style.color = "#198754";

      const fill = wrap.querySelector(".fill");
      if (fill) fill.style.clipPath = "inset(0 100% 0 0)";
    });
  }

  function updateMetricBar(key, value) {
    // const cfg = BAR_CONFIG[key];
    // if (!cfg) return;

    const wrap = document.querySelector(`.metric-range[data-key="${key}"]`);
    if (!wrap) return;

    const min = wrap.dataset.min;
    const max = wrap.dataset.max;

    const fill = wrap.querySelector(".fill");

    if (value === null || value === undefined || isNaN(value)) {
      if (fill) fill.style.clipPath = "inset(0 100% 0 0)";
      return;
    }

    const v = Number(value);
    const pct = ((v - min) / (max - min)) * 100;
    const safePct = clamp(pct, 0, 100);

    if (fill) {
      // fill.style.clipPath = `inset(0 ${100 - safePct}% 0 0)`;
      fill.style.clipPath = `inset(0 50% 0 0)`;
    }
  }

  //=============== Function Calc ==================
  function clamp(n, min, max) {
    return Math.max(min, Math.min(max, n));
  }

  function toNumber(v) {
    const n = parseFloat(v);
    return Number.isFinite(n) ? n : 0;
  }

  function formatNumber(num) {
    return new Intl.NumberFormat("en-US").format(num);
  }

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function Min(list) {
    if (!Array.isArray(list)) return 0;
    let min = Math.min(list);
    return min;
  }

  function Max(list) {
    if (!Array.isArray(list)) return 0;
    let max = Math.max(list);
    return max;
  }

  function Avg(list) {
    if (!Array.isArray(list)) return 0;
    const avg = (Sum(list) / list.length).toFixed(2);
    return avg;
  }

  function Sum(list) {
    if (!Array.isArray(list)) return 0;
    let sum = 0;
    list.forEach((v) => {
      sum += v;
    });
    return sum;
  }

  async function calculateElectricityAndWater(CardId) {
    let sensor_Name = "";
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");

      const resel = await fetch(

        "&start_time=" +
        formattedDate,
      );
      const rawwa = await reswa.json();
      const datawa = rawwa["data"];
      const waterUnit = parseFloat(datawa[0]["diff"]?.toString()) ?? 0;

      const water = isNaN(waterUnit) ? 0 : waterUnit * water_unit;

      SetValueInHTMLById(CardId + "-water-usage", water.toFixed(2));
    } catch (err) {
      console.error("❌ loadSensorData error:", err);
    }
  }

  async function loadGraphMarketById() {
    const table_type = 6;
    const loading = document.getElementById("price-loading");
    const typeContainer = document.getElementById("types-MarketChart");

    try {
      const res = await fetch(
        "../../api-website/fetch_tableByTypeId.php?typeId=" + table_type,
      );
      const raw = await res.json();
      const tables = raw.data;

      if (!tables || typeof tables !== "object") {
        renderMarketPriceChart([], []);
        return;
      }

      // 1️⃣ หา table หลัก
      const mainTable = Object.values(tables).find((t) => !t.child_of_table_id);
      if (!mainTable) return;

      // 2️⃣ เรียง X-axis แบบ numeric
      const labels = mainTable.children
        .map((row) => row.end_day)
        .sort((a, b) => Number(a) - Number(b));

      // 3️⃣ หา table ลูก
      const childTables = Object.values(tables).filter(
        (t) => t.child_of_table_id === mainTable.id,
      );

      // 4️⃣ สร้าง full dataset
      fullDatasets = childTables.map((table, index) => {
        const dataMap = {};
        table.children.forEach((row) => {
          dataMap[row.end_day] = Number(row.value);
        });

        return {
          label: table.label,
          data: labels.map((day) => dataMap[day] ?? null),
          borderWidth: 2,
          fill: false,
          spanGaps: true,
          tension: 0.3,
          pointRadius: screenWidth >= 3840 ? 5 : 2,
        };
      });

      // 5️⃣ สร้างปุ่มเฉพาะครั้งแรกเท่านั้น
      if (!filterInitialized) {
        typeContainer.innerHTML = "";

        childTables.forEach((table) => {
          const btn = document.createElement("button");
          btn.textContent = table.label;

          btn.className = `
            px-3 py-1 rounded-lg border text-[0.5vw]
            border-stone-300 bg-white text-stone-600
            hover:bg-orange-50 hover:border-orange-400
            transition-all duration-200
        `;

          btn.addEventListener("click", () => {
            if (selectedTypes.has(table.label)) {
              selectedTypes.delete(table.label);
              btn.classList.remove(
                "bg-orange-500",
                "text-white",
                "border-orange-500",
              );
            } else {
              selectedTypes.add(table.label);
              btn.classList.add(
                "bg-orange-500",
                "text-white",
                "border-orange-500",
              );
            }

            updateChart(labels);
          });

          typeContainer.appendChild(btn);
        });

        filterInitialized = true;
      }

      // 6️⃣ update chart (ใช้ selectedTypes เดิม)
      updateChart(labels);
    } catch (err) {
      console.error("❌ price trend error:", err);
    } finally {
      if (loading) loading.classList.add("hidden");
    }
  }

  function updateChart(labels) {
    let filtered;

    if (selectedTypes.size === 0) {
      filtered = fullDatasets;
    } else {
      filtered = fullDatasets.filter((d) => selectedTypes.has(d.label));
    }

    const allValues = filtered.flatMap((d) => d.data).filter((v) => v !== null);

    let min = Math.min(...allValues);
    let max = Math.max(...allValues);

    min -= min * 0.05;
    max += max * 0.05;

    if (!trendChart) {
      renderMarketPriceChart(labels, filtered, min, max);
    } else {
      trendChart.data.labels = labels;
      trendChart.data.datasets = filtered;
      trendChart.options.scales.y.min = min;
      trendChart.options.scales.y.max = max;
      trendChart.update("none");
    }
  }

  function toggleDarkMode() {
    const isDark = document.documentElement.classList.toggle("dark");
    document.documentElement.classList.toggle("light", !isDark);
    document.getElementById("icon-moon").style.display = isDark
      ? "none"
      : "inline";
    document.getElementById("icon-sun").style.display = isDark
      ? "inline"
      : "none";
    document.getElementById("mode-label").textContent = isDark
      ? "Light"
      : "Dark";
    localStorage.setItem("theme", isDark ? "dark" : "light");
  }

  /* โหลด preference จาก localStorage เมื่อเปิดหน้า */
  (function () {
    const saved = localStorage.getItem("theme");
    if (saved === "dark") {
      document.documentElement.classList.add("dark");
      document.documentElement.classList.remove("light");
      const moon = document.getElementById("icon-moon");
      const sun = document.getElementById("icon-sun");
      const label = document.getElementById("mode-label");
      if (moon) moon.style.display = "none";
      if (sun) sun.style.display = "inline";
      if (label) label.textContent = "Light";
    }
  })();

  async function loadPieGraph() {
    // const data = [40, 30, 15, 15];
    const res = await fetch("../../api-website/fetch_expenses.php?bid=" + branchID);
    const raw = await res.json();
    const data = raw["data"];

    const categoryMap = {};
    data.forEach((item) => {
      if (!categoryMap[item.category_id]) {
        categoryMap[item.category_id] = 0;
      }
      categoryMap[item.category_id] += Number(item.amount);
    });

    const sorted = Object.entries(categoryMap).sort((a, b) => b[1] - a[1]);

    const total = sorted.reduce((sum, c) => sum + c[1], 0);

    let current = 0;

    const gradient = sorted
      .map((item, index) => {
        const categoryId = item[0];
        const amount = item[1];
        const percent = parseFloat(((amount / total) * 100).toFixed(1));

        const start = current;
        const end = current + percent;
        current = end;
        return `${colors[index]} ${start}% ${end}%`;
      })
      .join(", ");

    let donut = document.getElementById("donut");
    donut.style.background = `conic-gradient(${gradient})`;

    SetValueInHTMLById("card-4-total", total);
  }

      else if (format === "pdf") {

        const doc = new jsPDF({
          orientation: "landscape",
          unit: "mm",
          format: "a4"
        });
        // =========================

        doc.setFontSize(18);

        doc.text(
          `${type.toUpperCase()} REPORT`,
          10,
          startY
        );

        startY += 10;


        // =========================
        // INFO SECTION
        // =========================
        doc.setFontSize(11);

        doc.text(
          `Branch: ${branchName || "Unknown Branch"}`,
          10,
          startY
        );

        startY += 7;

        doc.text(
          `Created on: ${new Date().toLocaleString()}`,
          10,

        );

        startY += 7;

        doc.text(
          `Number of results: ${data.length} rows`,
          10,
          startY
        );

        startY += 10;

        // =========================
        // TABLE
        // =========================

        const colWidth = 38;
        const rowHeight = 8;
        const startX = 10;

        doc.setFontSize(10);

        // Header
        headers.forEach((header, index) => {

          const x = startX + (index * colWidth);

          doc.rect(x, startY, colWidth, rowHeight);

          doc.text(
            String(header),
            x + 2,
            startY + 5
          );

        });

        startY += rowHeight;

        // Rows
        rows.forEach((row, rowIndex) => {

          headers.forEach((header, colIndex) => {

            const x = startX + (colIndex * colWidth);
            const y = startY + (rowIndex * rowHeight);

            let value = row[header] ?? "-";

            value = String(value);

            // ตัดข้อความยาว
            if (value.length > 18) {
              value = value.substring(0, 18) + "...";
            }

            // Cell Border
            doc.rect(x, y, colWidth, rowHeight);

            // Text
            doc.text(
              value,
              x + 2,
              y + 5
            );

          });

        });
        // =========================
        // FILE NAME
        // =========================
        const now = new Date();

        const fileName = `${type}_${now.getDate()
          }-${now.getMonth() + 1
          }-${now.getFullYear()
          }_${now.getHours()
          }-${now.getMinutes()
          }.pdf`;

        doc.save(fileName);
      }

    } catch (err) {
      console.error(err);

  //Sensors function

  // ===== renderSensorGraph — render กราฟตาม sensor ที่ checkbox เลือกไว้ =====

  function renderSensorGraph(sensors) {
    if (!sensors) return;

    const titleEl = document.getElementById('title-graph-sensor');
    const subtitleEl = document.getElementById('title-graph-sensor-sub');
    const canvas = document.getElementById('TrendChart');
    if (!canvas) return;

    const sw = window.innerWidth;
    let fontSize = 9;
    if (sw >= 3840) fontSize = 18;
    else if (sw >= 1920) fontSize = 12;
    const ptRadius = sw >= 3840 ? 4 : 2;

    const isDark = document.documentElement.classList.contains('dark');
    const tickColor = isDark ? '#a8a29e' : '#78716c';

    // ── กรอง sensor ที่ถูกเลือก (เปรียบ monitor_id เป็น string เสมอ) ──
    const selectedIds = new Set([...sensor_selected_set].map(id => String(id)));

    // ── ถ้าไม่มีอะไรถูกเลือกเลย ใช้ sensor_select เดิม (fallback) ──
    if (selectedIds.size === 0) {
      const row = Object.values(sensors).find(
        s => String(s.monitor_id) === String(sensor_select)
      );
      if (!row || !row.logs?.length) return;
      _renderSingleLine(row, canvas, titleEl, subtitleEl, fontSize, ptRadius, tickColor);
      return;
    }

    // ── สร้าง datasets ──
    const datasets = [];
    const titleNames = [];
    let allLabels = [];

    Object.entries(sensors).forEach(([name, row]) => {
      if (!row?.monitor_id) return;
      if (!selectedIds.has(String(row.monitor_id))) return;   // ← string compare

      const logs = row.logs || [];

      const labels = logs.map(p => {
        const d = new Date(p.createtime);
        return isNaN(d.getTime())
          ? String(p.createtime || '')
          : `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
      });
      if (labels.length > allLabels.length) allLabels = labels;

      // สีจาก sensorColorMap
      const color = sensorColorMap[String(row.monitor_id)] || '#f97316';

      const values = logs.map(p => {
        const v = parseFloat(p.data_value);
        return isNaN(v) ? null : v;
      });

      titleNames.push(name);
      datasets.push({
        label: `${name}${row.unit ? ' (' + row.unit + ')' : ''}`,
        data: values,
        borderColor: color,
        backgroundColor: color + '22',
        borderWidth: 2,
        pointRadius: ptRadius,
        pointHoverRadius: ptRadius + 2,
        pointBackgroundColor: color,
        tension: 0.4,
        fill: false,
        spanGaps: true,
      });
    });

    if (datasets.length === 0) return;

    // ── title ──
    if (titleEl) titleEl.textContent = 'แนวโน้มค่า ' + titleNames.join(' / ');
    if (subtitleEl) subtitleEl.textContent = titleNames.join(' | ') + ' Historical Data';

    // ── y-axis range ──
    const allVals = datasets.flatMap(d => d.data).filter(v => v !== null);
    let yMin = Math.min(...allVals); yMin -= Math.abs(yMin) * 0.05;
    let yMax = Math.max(...allVals); yMax += Math.abs(yMax) * 0.05;

    // ── destroy chart เดิม ──
    if (typeof sensorChart !== 'undefined' && sensorChart) {
      sensorChart.destroy();
      sensorChart = null;
    }

    // ── render ──
    sensorChart = new Chart(canvas, {
      type: 'line',
      data: { labels: allLabels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            display: datasets.length > 1,
            position: 'top',
            labels: { font: { size: fontSize - 1 }, boxWidth: 10, padding: 6, color: tickColor }
          },
          tooltip: {
            mode: 'index',
            intersect: false,
            callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(2) ?? '-'}` }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { font: { size: fontSize }, color: tickColor, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }
          },
          y: {
            min: yMin,
            max: yMax,
            ticks: { font: { size: fontSize }, color: tickColor, callback: v => v.toFixed(1) },
            grid: { color: 'rgba(0,0,0,0.05)' }
          }
        }
      }
    });
  }


  // ===== SENSOR CHECKBOX PANEL =====

  // สีสำหรับแต่ละ sensor line
  const sensorLineColors = [
    '#f97316', // orange
    '#3b82f6', // blue
    '#10b981', // green
    '#a855f7', // purple
    '#ef4444', // red
    '#eab308', // yellow
  ];

  // map เก็บสีของแต่ละ monitor_id ถาวร (ไม่เปลี่ยนเมื่อ rebuild)
  const sensorColorMap = {};

  function buildSensorCheckboxes(sensors) {
    const panel = document.getElementById('sensor-checkbox-panel');
    if (!panel) return;

    // assign สีถาวรให้แต่ละ sensor (ครั้งแรกเท่านั้น)
    let colorIdx = 0;
    Object.entries(sensors).forEach(([name, row]) => {
      if (!row?.monitor_id) return;
      const key = String(row.monitor_id);
      if (!sensorColorMap[key]) {
        sensorColorMap[key] = sensorLineColors[colorIdx % sensorLineColors.length];
      }
      colorIdx++;
    });

    // auto-select sensor แรกที่มีข้อมูล (ถ้ายังไม่มีอะไรใน set)
    if (sensor_selected_set.size === 0) {
      const first = Object.values(sensors).find(r => r?.monitor_id && r.unit !== '--');
      if (first) {
        sensor_selected_set.add(String(first.monitor_id));
        sensor_select = first.monitor_id;
      }
    }

    // ถ้า button มีอยู่แล้ว → แค่ sync visual state ตาม sensor_selected_set แล้วออก
    const alreadyBuilt = panel.querySelector('button[data-sensor-id]');
    if (alreadyBuilt) {
      panel.querySelectorAll('button[data-sensor-id]').forEach(btn => {
        const id = btn.dataset.sensorId;
        const name = btn.dataset.sensorName;
        const color = sensorColorMap[id] || '#f97316';
        const checked = sensor_selected_set.has(id);
        _updateSensorBtnStyle(btn, checked, color, name);
      });
      const allBtn = document.getElementById('sensor-btn-all');
      if (allBtn) _updateAllBtnStyle(allBtn, sensors);
      return;
    }

    // ครั้งแรก — สร้าง toggle button ทั้งหมด
    const header = panel.querySelector('p');
    panel.innerHTML = '';
    if (header) panel.appendChild(header);

    // ── ปุ่ม ALL ──
    const allBtn = document.createElement('button');
    allBtn.id = 'sensor-btn-all';
    allBtn.type = 'button';
    _updateAllBtnStyle(allBtn, sensors);

    allBtn.addEventListener('click', () => {
      const validIds = Object.entries(sensors)
        .filter(([, r]) => r?.monitor_id && r.unit !== '--')
        .map(([, r]) => String(r.monitor_id));

      const allSelected = validIds.every(id => sensor_selected_set.has(id));

      if (allSelected) {
        // ถ้าเลือกทั้งหมดอยู่แล้ว → ยกเลิกทั้งหมด (เหลือแค่ตัวแรก)
        sensor_selected_set.clear();
        if (validIds.length > 0) sensor_selected_set.add(validIds[0]);
      } else {
        // เลือกทั้งหมด
        validIds.forEach(id => sensor_selected_set.add(id));
      }

      // sync ปุ่ม sensor ทุกตัว
      panel.querySelectorAll('button[data-sensor-id]').forEach(btn => {
        const id = btn.dataset.sensorId;
        const name = btn.dataset.sensorName;
        const color = sensorColorMap[id] || '#f97316';
        _updateSensorBtnStyle(btn, sensor_selected_set.has(id), color, name);
      });

      // sync การ์ดด้านล่าง
      if (_sensors_cache) {
        Object.entries(_sensors_cache).forEach(([name, row]) => {
          if (!row?.monitor_id || row.unit === '--') return;
          const card = document.getElementById(`card-${name}`);
          if (card) _updateCardSelectedStyle(card, name, row, sensor_selected_set.has(String(row.monitor_id)));
        });
      }

      _updateAllBtnStyle(allBtn, sensors);
      if (_sensors_cache) renderSensorGraph(_sensors_cache);
    });

    panel.appendChild(allBtn);

    // ── divider ──
    const hr = document.createElement('div');
    hr.style.cssText = 'width:100%;height:1px;background:#e7e5e4;margin:0.2vh 0;';
    panel.appendChild(hr);

    // ── ปุ่ม sensor แต่ละตัว ──
    Object.entries(sensors).forEach(([name, row]) => {
      if (!row?.monitor_id || row.unit === '--') return;
      const id = String(row.monitor_id);
      const color = sensorColorMap[id] || '#f97316';
      const isChecked = sensor_selected_set.has(id);

      const btn = document.createElement('button');
      btn.id = `sensor-btn-${id}`;
      btn.dataset.sensorId = id;
      btn.dataset.sensorName = name;
      btn.dataset.color = color;
      btn.type = 'button';

      _updateSensorBtnStyle(btn, isChecked, color, name);

      btn.addEventListener('click', () => {
        const nowSelected = sensor_selected_set.has(id);
        if (nowSelected) {
          sensor_selected_set.delete(id);
        } else {
          sensor_selected_set.add(id);
        }
        _updateSensorBtnStyle(btn, !nowSelected, color, name);

        // sync การ์ดด้านล่าง
        const card = document.getElementById(`card-${name}`);
        const rowData = _sensors_cache?.[name];
        if (card && rowData) _updateCardSelectedStyle(card, name, rowData, !nowSelected);

        // อัปเดต ALL button
        _updateAllBtnStyle(allBtn, sensors);

        if (_sensors_cache) renderSensorGraph(_sensors_cache);
      });

      panel.appendChild(btn);
    });
  }

                    </span>
                </div>` : ''}
                `;

      if (hasData) {
        div.onclick = () => {
          const id = String(row.monitor_id);
          const nowSelected = sensor_selected_set.has(id);
          // toggle
          if (nowSelected) {
            sensor_selected_set.delete(id);
          } else {
            sensor_selected_set.add(id);
          }
          // sync checkbox panel button
          const btn = document.getElementById(`sensor-btn-${id}`);
          if (btn) {
            _updateSensorBtnStyle(btn, !nowSelected, sensorColorMap[id] || '#f97316', s);
          }
          // re-render card และ graph
          _updateCardSelectedStyle(div, s, row, !nowSelected);
          if (_sensors_cache) renderSensorGraph(_sensors_cache);

      }

      metricsCards.appendChild(div);

      if (sensor_select == 0 && row.monitor_id) {
        sensor_select = row.monitor_id;

    try {

      const res = await fetch('../../api-app/fetch-tableknowledge.php', {
        method: 'POST',
        body: fd
      });

      const json = await res.json();

      console.log(tables);

      const day = Number(
        (typeof data !== 'undefined' && data?.day != null)
          ? data.day
          : 0
      );
      console.log('🌴 loadPapayaTableData — day:', day, '| tables count:', tables?.length);

      function getRow(tableId) {
        const table = tables.find(t => t.id == tableId);
        if (!table || !table.rows) {
          console.warn(`⚠️ getRow: table ${tableId} ไม่พบ`);
          return null;
        }

        const matched = table.rows.find(r => {
          const start = Number(r.d_start_day);
          const end = Number(r.d_end_day);
          if (start === 0 && end === 0) return true;
          return day >= start && day <= end;
        });

        if (!matched) {
          console.warn(`⚠️ getRow: table ${tableId} ไม่มี row ที่ตรงกับ day=${day}, ใช้ row แรก`);
        }

        return matched || table.rows[0];
      }

      function getVal(tableId) {
        return getRow(tableId)?.d_value ?? '-';
      }

      function getRange(tableId) {
        const r = getRow(tableId);
        if (!r) return '-';
        return `${r.d_start_day} - ${r.d_end_day} วัน`;

      const table1 = tables.find(t => t.id == 1);
      if (table1 && table1.rows) {
        buildDots(table1.rows);
        const currentVal = getVal(1);
        const activeIndex = table1.rows.findIndex(r => r.d_value === currentVal);
        setActive(activeIndex >= 0 ? activeIndex : 0, table1.rows.length);
      }

      // ===============================
      // ✅ PANEL A
      // ===============================
      SetValueInHTMLById('ec', getVal(5));
      SetValueInHTMLById('ph', getVal(6));
      SetValueInHTMLById('temperature', getVal(7));
      SetValueInHTMLById('humidity', getVal(8));
      SetValueInHTMLById('light', getVal(9));
      SetValueInHTMLById('o2', getVal(10));
      SetValueInHTMLById('co2', getVal(11));

      // ===============================
      // ✅ PANEL B
      // ===============================
      SetValueInHTMLById('fert-chemical', getVal(12));
      SetValueInHTMLById('fert-bio', getVal(13));
      SetValueInHTMLById('fert-organic', getVal(14));
      SetValueInHTMLById('fert-ab', getVal(15));
      SetValueInHTMLById('fert-mix', getVal(16));

      // ===============================
      // ✅ PANEL C
      // ===============================
      SetValueInHTMLById('care-disease', getVal(17));
      SetValueInHTMLById('care-note', getVal(18));

      console.log('✅ Papaya data loaded');

    } catch (err) {
      console.error('❌ loadPapayaTableData error:', err);
    }
  }


  // helper: render sensor เดียว (fallback)
  function _renderSingleLine(row, canvas, titleEl, subtitleEl, fontSize, ptRadius, tickColor) {
    const labels = row.logs.map(p => {
      const d = new Date(p.createtime);
      return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    });
    const values = row.logs.map(p => parseFloat(p.data_value));
    const min = Math.min(...values) * 0.95;
    const max = Math.max(...values) * 1.05;

    if (titleEl) titleEl.textContent = 'แนวโน้มค่า ' + row.monitor_name;
    if (subtitleEl) subtitleEl.textContent = 'Historical ' + row.monitor_name + ' Data';

    if (typeof sensorChart !== 'undefined' && sensorChart) {
      sensorChart.destroy(); sensorChart = null;
    }

    sensorChart = new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: values,
          borderColor: '#ff8021',
          backgroundColor: 'rgba(255,128,33,0.1)',
          tension: 0.4,
          fill: true,
          pointRadius: ptRadius,
          pointBackgroundColor: '#ff8021',
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y.toFixed(2)}` } } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: fontSize }, color: tickColor, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 } },
          y: { beginAtZero: true, min, max, ticks: { font: { size: fontSize }, color: tickColor, callback: v => v.toFixed(1) }, grid: { color: 'rgba(0,0,0,0.05)' } }
        }
      }
    });
  }



  function onSensorCheckboxChange(sensorId, checked, sensors) {
    const id = String(sensorId);

    if (checked) {
      sensor_selected_set.add(id);
    } else {
      sensor_selected_set.delete(id);
    }

    const btn = document.getElementById(`sensor-btn-${id}`);
    if (btn) {
      const name = btn.dataset.sensorName || id;
      const color = sensorColorMap[id] || '#f97316';
      _updateSensorBtnStyle(btn, checked, color, name);
    }

    if (_sensors_cache) {
      Object.entries(_sensors_cache).forEach(([name, row]) => {
        if (String(row?.monitor_id) === id) {
          const card = document.getElementById(`card-${name}`);
          if (card) _updateCardSelectedStyle(card, name, row, checked);
        }
      });
    }

    if (sensors) renderSensorGraph(sensors);
  }



  // helper: อัปเดต style ของ toggle button ใน panel
  function _updateSensorBtnStyle(btn, isSelected, color, name) {
    if (isSelected) {
      btn.style.cssText = `
            display: flex; align-items: center; gap: 0.3vw;
            width: 100%; padding: 0.3vh 0.4vw; border-radius: 0.5vw;
            border: 1.5px solid ${color}; background: ${color}22;
            cursor: pointer; transition: all 0.15s;
        `;
      btn.innerHTML = `
            <span style="width:0.5vw;height:0.5vw;border-radius:50%;background:${color};flex-shrink:0;"></span>
            <span style="font-size:0.55vw;font-weight:700;color:${color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:5vw;">${name}</span>
        `;
    } else {
      btn.style.cssText = `
            display: flex; align-items: center; gap: 0.3vw;
            width: 100%; padding: 0.3vh 0.4vw; border-radius: 0.5vw;
            border: 1.5px solid #d4d4d4; background: transparent;
            cursor: pointer; transition: all 0.15s;
        `;
      btn.innerHTML = `
            <span style="width:0.5vw;height:0.5vw;border-radius:50%;background:transparent;border:1.5px solid #a8a29e;flex-shrink:0;"></span>
            <span style="font-size:0.55vw;font-weight:600;color:#a8a29e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:5vw;">${name}</span>
        `;
    }
  }


  // helper: สร้าง/อัปเดต style ปุ่ม ALL
  function _updateAllBtnStyle(btn, sensors) {
    const validIds = Object.entries(sensors)
      .filter(([, r]) => r?.monitor_id && r.unit !== '--')
      .map(([, r]) => String(r.monitor_id));
    const allSelected = validIds.length > 0 && validIds.every(id => sensor_selected_set.has(id));

    if (allSelected) {
      btn.style.cssText = `
            display: flex; align-items: center; justify-content: center; gap: 0.3vw;
            width: 100%; padding: 0.3vh 0.4vw; border-radius: 0.5vw;
            border: 1.5px solid #f97316; background: #f9731622;
            cursor: pointer; transition: all 0.15s;
        `;
      btn.innerHTML = `<span style="font-size:0.55vw;font-weight:800;color:#f97316;letter-spacing:0.05em;">ALL ✓</span>`;
    } else {
      btn.style.cssText = `
            display: flex; align-items: center; justify-content: center; gap: 0.3vw;
            width: 100%; padding: 0.3vh 0.4vw; border-radius: 0.5vw;
            border: 1.5px dashed #d4d4d4; background: transparent;
            cursor: pointer; transition: all 0.15s;
        `;
      btn.innerHTML = `<span style="font-size:0.55vw;font-weight:700;color:#a8a29e;letter-spacing:0.05em;">ALL</span>`;
    }
  }


  // อัปเดต visual ของการ์ดเมื่อ toggle
  function _updateCardSelectedStyle(div, sensorName, row, isSelected) {
    const id = String(row.monitor_id);
    const color = sensorColorMap[id] || '#f97316';

    if (isSelected) {
      div.style.borderColor = color;
      div.style.boxShadow = `0 0 0 2px ${color}55`;
    } else {
      div.style.borderColor = '';
      div.style.boxShadow = '';
    }

    // rebuild innerHTML ของ header ส่วนต้น
    const headerDiv = div.querySelector('.w-full.flex.justify-between.items-center');
    if (headerDiv) {
      const statusSpan = headerDiv.querySelector('.status');
      const statusHtml = statusSpan ? statusSpan.outerHTML : '';
      headerDiv.innerHTML = `
                <div class="flex items-center gap-[0.3vw]">
                    <span class="w-[0.5vw] h-[0.5vw] rounded-full shrink-0" style="background:${isSelected ? color : '#a8a29e'}"></span>
                    <span class="text-[0.75vw] font-bold uppercase tracking-widest" style="color:${isSelected ? color : ''}">
                        ${sensorName}
                    </span>
                </div>
                ${statusHtml}
            `;
    }

    // update label ด้านล่าง
    const labelWrapper = div.querySelector('div[class*="flex items-center justify-center gap"]');
    if (labelWrapper) {
      labelWrapper.innerHTML = `<span class="text-[0.45vw] font-semibold uppercase tracking-wide" style="color:${isSelected ? color : '#a8a29e'}">
                ${isSelected ? '● แสดงในกราฟ' : '○ แตะเพื่อเพิ่ม'}
            </span>`;
    }
  }
</script>
