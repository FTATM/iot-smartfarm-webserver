    async function loadSensorData() {
        let sensors;
        try {
            const res = await fetch(
                "../../api-website/plot_sensor_log_multiple.php",
                {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        sensorLog: Sensors_realtime,
                    }),
                },
            );
            const data = await res.json();

        } catch (err) {

        }
        Create_sensorCard(Sensors_realtime, sensors);

        loadGraphSensorById(sensors);
    }

    function Create_sensorCard(sensor_names, sensors) {
        let metricsCards = document.getElementById("metrics-cards");
        metricsCards.innerHTML = "";
        Object.values(sensor_names).forEach((s) => {
            const row = sensors[s] || { "min": 0, "max": 0, "unit": "--", "logs": [] };
            const min = row["min"] || 0;
            const max = row["max"] || 1;
            let value = row.logs.length > 0 ? row.logs[0].data_value : "--";
            let div = document.createElement("div");
            div.id = `card-${s}`;
            div.className = "bg-white dark:bg-stone-900 box rounded-2xl p-[0.5vw] border border-stone-200 dark:border-0 shadow-sm flex flex-col hover:ring-2 hover:ring-orange-400 transition-all duration-20 shrink-0";
            div.innerHTML = `
                <div class="w-full flex justify-between items-center">
                    <span class="text-[0.75vw] font-bold text-stone-500 dark:text-white uppercase tracking-widest">
                        ${s}
                    </span>
                    <span class="px-2 py-0.5 rounded-full bg-stone-100 text-stone-500 text-[0.5vw] font-bold uppercase status">
                        --
                    </span>
                </div>
                <div class="flex-1 flex items-center justify-center">
                    <div class="flex items-baseline gap-1">
                        <span class="text-[1.5vw] font-black text-black dark:text-white value">
                            ${value}
                        </span>
                        <span class="text-[0.75vw] font-bold text-stone-400 dark:text-stone-200">
                            ${row.unit ?? ""}
                        </span>
                    </div>
                </div>

                <!-- Range Bar with Fixed Gradient -->
                <div class="metric-range mt-2 hidden" data-key="${s}" data-min="${min}" data-max="${max}">
                    <div class="flex justify-between text-[1vw] font-bold leading-none mb-1">
                        <span class="label-left"></span>
                        <span class="label-right"></span>
                    </div>

                    <div class="relative h-1.5 rounded-full bar">
                        <div class="fill"></div>
                    </div>
                </div>
                `;

            if (row["unit"] !== "--") {
                div.onclick = () => {
                    sensor_select = row.monitor_id;
                    loadGraphSensorById(sensors);
                };
            }

            metricsCards.appendChild(div);

            setCardValue(s, value, min, max);

            if (sensor_select == 0 && row.monitor_id) {
                sensor_select = row.monitor_id;
            }
        });
    }

    async function Card4() {
        let table = [];
        let expense = [];
        let categories = [];
        const table_type = 6;
        const category_type = 'expense';
        try {
            const res = await fetch('../../api-website/fetch_expenses.php?bid=' + branchID);
            const raw = await res.json();
            expense = raw['data'];

            const resincome = await fetch('../../api-website/fetch_incomes.php?bid=' + branchID);
            const rawincome = await resincome.json();
            income = rawincome['data'];

            const rescat = await fetch('../../api-website/fetch_categories.php?type=' + category_type);
            const raw3 = await rescat.json();
            categories = raw3['data'];

            const res4 = await fetch('../../api-website/fetch_tableByTypeId.php?typeId=' + table_type + "&aDay=" + data.day);
            const raw4 = await res4.json();
            table = raw4['data'];


        } catch (err) {
            console.error('❌ fetch expenses error:', err);

        }

        const categoryMapex = {};
        const categoryMapin = {};

        expense.forEach(item => {
            if (!categoryMapex[item.category_id]) {
                categoryMapex[item.category_id] = 0;
            }
            categoryMapex[item.category_id] += Number(item.amount);
        });
        income.forEach(item => {
            if (!categoryMapin[item.category_id]) {
                categoryMapin[item.category_id] = 0;
            }
            categoryMapin[item.category_id] += Number(item.amount);
        });

        const sortedex = Object.entries(categoryMapex)
            .sort((a, b) => b[1] - a[1]);

        const totalin = Object.values(categoryMapin)
            .reduce((sum, value) => sum + value, 0);

        const totalex = sortedex.reduce((sum, c) => sum + c[1], 0);
        const top5ex = sortedex;
        // const top5ex = sortedex.slice(0, 5);

        SetValueInHTMLById('card-4-expense', '฿' + totalex);
        SetValueInHTMLById('card-4-income', '฿' + totalin);
        SetValueInHTMLById('card-4-remain', '฿' + (totalin - totalex));

        const listEl = document.getElementById("card-4-list");

        listEl.innerHTML = "";

        top5ex.forEach((item, index) => {

            const categoryId = item[0];
            const amount = item[1];
            const percent = ((amount / totalex) * 100).toFixed(1);

            let categoryName = categories.find(c => c['id'].toString() == categoryId.toString())?.name || "--";

            listEl.innerHTML += `
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">

                        <p class="text-[0.65vw] font-semibold dark:text-white">${categoryName}</p>

                    </div>
                </div>
                <div class="text-right pr-[0.5vw]">
                    <p class="text-[0.65vw] font-bold dark:text-white">${formatNumber(amount)}</p>
                    <p class="text-[0.4vw] text-slate-400">${percent}%</p>
                </div>
            </div>
            `;
        });
    }

var T2 = ['tab-env2','tab-fert2','tab-care2'];
var P2 = ['panel2-0','panel2-1','panel2-2'];

function switchCard2(idx) {
    T2.forEach(function(id, i) {
        var el = document.getElementById(id);
        if (!el) return;

        if (i === idx) {
            // ACTIVE (เน้นสีส้ม)
            el.style.backgroundColor = '#ff8021';
            el.style.color = '#ffffff';
            el.style.borderColor = '#ff8021';
        } else {
            // INACTIVE
            el.style.backgroundColor = '#ffffff';
            el.style.color = '#ff8021';
            el.style.borderColor = '#ff8021';
        }
    });

    P2.forEach(function(id, i) {
        var el = document.getElementById(id);
        if (!el) return;
        i === idx ? el.classList.remove('hidden') : el.classList.add('hidden');
    });
}

const dotColors  = ['#639922', '#1D9E75', '#BA7517', '#D85A30', '#888780'];
  const textColors = ['#27500A', '#085041', '#633806', '#4A1B0C', '#444441'];
  const fillPcts   = [0, 25, 50, 75, 100];
 
  function setActive(index) {
    const dots   = document.querySelectorAll('.dot');
    const nums   = document.querySelectorAll('.dot-num');
    const labels = document.querySelectorAll('.label');
    const fill   = document.getElementById('fill');
 
    dots.forEach((dot, i) => {
      const num = nums[i];
      if (i < index) {
        dot.style.background  = dotColors[index];
        dot.style.borderColor = dotColors[index];
        dot.style.width = dot.style.height = '20px';
        num.style.color = '#fff';
      } else if (i === index) {
        dot.style.background  = dotColors[index];
        dot.style.borderColor = dotColors[index];
        dot.style.width = dot.style.height = '24px';
        num.style.color = '#fff';
      } else {
        dot.style.background  = '#fff';
        dot.style.borderColor = '#ddd';
        dot.style.width = dot.style.height = '20px';
        num.style.color = '#888';
      }
    });
 
    labels.forEach((lbl, i) => {
      if (i === index) {
        lbl.style.color      = textColors[index];
        lbl.style.fontWeight = '700';
      } else if (i < index) {
        lbl.style.color      = dotColors[index];
        lbl.style.fontWeight = '500';
      } else {
        lbl.style.color      = '#888';
        lbl.style.fontWeight = '500';
      }
    });
 
    fill.style.background = dotColors[index];
    fill.style.width      = fillPcts[index] + '%';
  }
 
  setActive(0);
</script>
