    // cache ผลลัพธ์ TMD (fetch ครั้งเดียวต่อรอบ process)
    let _tmdCache = null;

    // ============================================================
    //  fetchTMD – fetch ครั้งเดียว, cache ใน memory
    // ============================================================
    async function fetchTMD() {
        const today = new Date().toISOString().split('T')[0];
        if (_tmdCache && _tmdCacheDate === today) return _tmdCache;

        const params = new URLSearchParams({
            lat: TMD_CONFIG.lat,
            lon: TMD_CONFIG.lon,
            fields: TMD_CONFIG.fields,
            date: today,
            duration: TMD_CONFIG.duration
        });

        const fullURL = `${TMD_CONFIG.url}?${params.toString()}`;
        console.log(`[TMD] GET → ${fullURL}`);

        const res = await fetch(fullURL, {
            method: 'GET',
            headers: {
                'accept': 'application/json',
                'authorization': `Bearer ${TMD_CONFIG.token}`
            }
        });

        if (!res.ok) {
            const errBody = await res.text();
            // แสดง body เต็มเพื่อดูว่า 422 เกิดจากอะไร
            console.error(`[TMD] HTTP ${res.status} body:`, errBody);
            throw new Error(`TMD ${res.status}: ${errBody.substring(0, 300)}`);
        }

        const json = await res.json();
        console.log('[TMD] response:', json);
        _tmdCache = json;
        _tmdCacheDate = today;
        return json;
    }

    // คืน forecasts[] หรือ [] ถ้า error
    async function getTMDForecasts() {
        try {
            const data = await fetchTMD();

        } catch (err) {
            console.error('[TMD] failed:', err.message);
            return [];
        }
    }

    // ============================================================
    //  Safe fetch helper – ป้องกัน PHP คืน HTML แทน JSON
    // ============================================================
    async function safeFetchJSON(url, options = {}) {
        try {
            const res  = await fetch(url, options);
            const text = await res.text();
            if (!text || text.trimStart().startsWith('<')) {
                const plain = text.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
                console.warn(`[DB] HTML instead of JSON (${url.split('/').pop()}):`, plain.substring(0, 200));
                return null;
            }
            return JSON.parse(text);
        } catch (err) {
            console.error(`[safeFetch] ${url}:`, err.message);
            return null;
        }
    }

    // แปลงองศาทิศทางลมเป็นภาษาไทย (16 ทิศ)
    function degToDir(deg) {
        if (deg == null || deg === "" || isNaN(deg)) return "--";
        const dirs = [
            "เหนือ", "เหนือ-ตอ.เฉียงเหนือ", "ตะวันออกเฉียงเหนือ", "ตอ.-ตอ.เฉียงเหนือ",
            "ตะวันออก", "ตอ.-ตอ.เฉียงใต้", "ตะวันออกเฉียงใต้", "ใต้-ตอ.เฉียงใต้",
            "ใต้", "ใต้-ตต.เฉียงใต้", "ตะวันตกเฉียงใต้", "ตต.-ตต.เฉียงใต้",
            "ตะวันตก", "ตต.-ตต.เฉียงเหนือ", "ตะวันตกเฉียงเหนือ", "เหนือ-ตต.เฉียงเหนือ"
        ];
        return dirs[Math.round(Number(deg) / 22.5) % 16];
    }
    // แปลง m/s → knots
    const toKnots  = (v)    => (v != null ? (Number(v) * 1.94).toFixed(1) : "--");

    // ---- helper สำหรับเกษตรกร ----
    function windLevel(kts) {
        const k = parseFloat(kts);
        if (isNaN(k))  return { label: '--',           color: 'text-slate-400',                       bg: '',                                       icon: '🌫️', tip: '' };
        if (k < 7)     return { label: 'ลมอ่อน',       color: 'text-green-600 dark:text-green-400',   bg: 'bg-green-50 dark:bg-green-900/20',        icon: '🍃', tip: 'เหมาะพ่นยา' };
        if (k < 14)    return { label: 'ลมปานกลาง',    color: 'text-yellow-600 dark:text-yellow-400', bg: 'bg-yellow-50 dark:bg-yellow-900/20',       icon: '💨', tip: 'ระวังสารพ่น' };
        if (k < 22)    return { label: 'ลมแรง',        color: 'text-orange-500 dark:text-orange-400', bg: 'bg-orange-50 dark:bg-orange-900/20',       icon: '🌬️', tip: 'งดพ่นยา' };
        return          { label: 'ลมแรงมาก',    color: 'text-red-600 dark:text-red-400',       bg: 'bg-red-50 dark:bg-red-900/20',            icon: '⚠️', tip: 'อันตราย' };
    }

    const LEVEL_DESC = {

    function shortDate(dateStr) {
        const d = new Date(dateStr);
        const m = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];

    // ============================================================

                    <span class="text-slate-500 dark:text-slate-400 w-[3vw]">${shortDate(f.time)}</span>

                    </div>
                    <span class="font-bold ${wl.color}">${kts} kts</span>
                </div>`;
            }).join('');
        }
    }

    async function Card4() {
        const forecasts = await getTMDForecasts();

        const todayCond = condInfo(todayData.cond);

        const iconEl = document.getElementById('current-icon');

        if (rainEl) rainEl.textContent  = todayData.rain != null ? `${fmt1(todayData.rain)} mm/day` : "-- mm/day";

        const dailyContainer = document.getElementById('daily-forecast');
        if (dailyContainer) {
            dailyContainer.innerHTML = forecasts.slice(1, 6).map((f) => {
                const d    = f?.data ?? {};

            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sensorLog: Sensors_realtime })

        _sensors_cache = sensors;
        Create_sensorCard(Sensors_realtime, sensors);
        if (sensors) {
            buildSensorCheckboxes(sensors);
            renderSensorGraph(sensors);

            headers: { 'Content-Type': 'application/json' },

        });
        if (data?.sensors) SetCardsBynames(Sensors_name_right, data.sensors, 'right');

    // ===== SENSOR COLOR MAP & LINE COLORS =====

        '#f97316', // orange
        '#3b82f6', // blue
        '#10b981', // green
        '#a855f7', // purple
        '#ef4444', // red
        '#eab308', // yellow

    const sensorColorMap = {};

    function Create_sensorCard(sensor_names, sensors) {
        const metricsCards = document.getElementById('metrics-cards');
        if (!metricsCards) return;
        metricsCards.innerHTML = "";

        Object.values(sensor_names).forEach((s) => {
            const row   = sensors?.[s] ?? { min: 0, max: 1, unit: "--", logs: [] };
            const min   = row.min ?? 0;
            const max   = row.max ?? 1;
            const value = Array.isArray(row.logs) && row.logs.length > 0
                ? row.logs[0].data_value : "--";

            const hasData = row.unit !== "--" && row.monitor_id;
            const isSelected = hasData && sensor_selected_set.has(String(row.monitor_id));
            const sensorColor = hasData ? (sensorColorMap[String(row.monitor_id)] || '#f97316') : null;

            const div = document.createElement('div');
            div.id        = `card-${s}`;
            div.className = "bg-white dark:bg-stone-900 box rounded-2xl p-[0.5vw] border shadow-sm flex flex-col transition-all duration-200 shrink-0 select-none"
                + (hasData ? " cursor-pointer hover:ring-2 hover:ring-orange-400" : "");

            if (isSelected && sensorColor) {
                div.style.borderColor = sensorColor;
                div.style.boxShadow = `0 0 0 2px ${sensorColor}55`;
            } else {
                div.style.borderColor = '';
            }

            div.innerHTML = `
                <div class="w-full flex justify-between items-center">
                    <div class="flex items-center gap-[0.3vw]">
                        ${isSelected && sensorColor
                            ? `<span class="w-[0.5vw] h-[0.5vw] rounded-full shrink-0" style="background:${sensorColor}"></span>`
                            : `<span class="w-[0.5vw] h-[0.5vw] rounded-full shrink-0 bg-stone-300 dark:bg-stone-600"></span>`}
                        <span class="text-[0.75vw] font-bold uppercase tracking-widest" style="color:${isSelected && sensorColor ? sensorColor : ''};" class="text-stone-500 dark:text-white">
                            ${s}
                        </span>
                    </div>
                    <span class="px-2 py-0.5 rounded-full bg-stone-100 text-stone-500 text-[0.5vw] font-bold uppercase status">--</span>
                </div>
                <div class="flex-1 flex items-center justify-center">
                    <div class="flex items-baseline gap-1">
                        <span class="text-[1.5vw] font-black text-black dark:text-white value">${value}</span>
                        <span class="text-[0.75vw] font-bold text-stone-400 dark:text-stone-200">${row.unit ?? ''}</span>
                    </div>
                </div>
                <div class="metric-range mt-2 hidden" data-key="${s}" data-min="${min}" data-max="${max}">
                    <div class="flex justify-between text-[1vw] font-bold leading-none mb-1">
                        <span class="label-left"></span><span class="label-right"></span>
                    </div>
                    <div class="relative h-1.5 rounded-full bar"><div class="fill"></div></div>
                </div>
                ${hasData ? `<div class="mt-[0.3vh] flex items-center justify-center gap-[0.2vw]">
                    <span class="text-[0.45vw] font-semibold uppercase tracking-wide" style="color:${isSelected && sensorColor ? sensorColor : '#a8a29e'}">
                        ${isSelected ? '● แสดงในกราฟ' : '○ แตะเพื่อเพิ่ม'}
                    </span>
                </div>` : ''}`;

            if (hasData) {
                div.onclick = () => {
                    const id = String(row.monitor_id);
                    const nowSelected = sensor_selected_set.has(id);
                    if (nowSelected) {
                        sensor_selected_set.delete(id);
                    } else {
                        sensor_selected_set.add(id);
                    }
                    const btn = document.getElementById(`sensor-btn-${id}`);
                    if (btn) {
                        _updateSensorBtnStyle(btn, !nowSelected, sensorColorMap[id] || '#f97316', s);
                    }
                    _updateCardSelectedStyle(div, s, row, !nowSelected);
                    if (_sensors_cache) renderSensorGraph(_sensors_cache);
                };
            }

            metricsCards.appendChild(div);
            if (typeof setCardValue === 'function') setCardValue(s, value, min, max);
            if (sensor_select === 0 && row.monitor_id) sensor_select = row.monitor_id;
        });
    }

    // อัปเดต visual ของการ์ดเมื่อ toggle
    function _updateCardSelectedStyle(div, sensorName, row, isSelected) {
        const id = String(row.monitor_id);
        const color = sensorColorMap[id] || '#f97316';

        if (isSelected) {
            div.style.borderColor = color;
            div.style.boxShadow = `0 0 0 2px ${color}55`;
        } else {
            div.style.borderColor = '';
            div.style.boxShadow = '';
        }

        const headerDiv = div.querySelector('.w-full.flex.justify-between.items-center');
        if (headerDiv) {
            const statusSpan = headerDiv.querySelector('.status');
            const statusHtml = statusSpan ? statusSpan.outerHTML : '';
            headerDiv.innerHTML = `
                <div class="flex items-center gap-[0.3vw]">
                    <span class="w-[0.5vw] h-[0.5vw] rounded-full shrink-0" style="background:${isSelected ? color : '#a8a29e'}"></span>
                    <span class="text-[0.75vw] font-bold uppercase tracking-widest" style="color:${isSelected ? color : ''}">
                        ${sensorName}
                    </span>
                </div>
                ${statusHtml}`;
        }

        const labelWrapper = div.querySelector('div[class*="flex items-center justify-center gap"]');
        if (labelWrapper) {
            labelWrapper.innerHTML = `<span class="text-[0.45vw] font-semibold uppercase tracking-wide" style="color:${isSelected ? color : '#a8a29e'}">
                ${isSelected ? '● แสดงในกราฟ' : '○ แตะเพื่อเพิ่ม'}
            </span>`;
        }
    }

    // ===== SENSOR CHECKBOX PANEL =====
    function buildSensorCheckboxes(sensors) {
        const panel = document.getElementById('sensor-checkbox-panel');
        if (!panel) return;

        // assign สีถาวรให้แต่ละ sensor
        let colorIdx = 0;
        Object.entries(sensors).forEach(([name, row]) => {
            if (!row?.monitor_id) return;
            const key = String(row.monitor_id);
            if (!sensorColorMap[key]) {
                sensorColorMap[key] = sensorLineColors[colorIdx % sensorLineColors.length];
            }
            colorIdx++;
        });

        // auto-select sensor แรกถ้ายังไม่มี
        if (sensor_selected_set.size === 0) {
            const first = Object.values(sensors).find(r => r?.monitor_id && r.unit !== '--');
            if (first) {
                sensor_selected_set.add(String(first.monitor_id));
                sensor_select = first.monitor_id;
            }
        }

        // ถ้า button มีอยู่แล้ว → sync visual state แล้วออก
        const alreadyBuilt = panel.querySelector('button[data-sensor-id]');
        if (alreadyBuilt) {
            panel.querySelectorAll('button[data-sensor-id]').forEach(btn => {
                const id    = btn.dataset.sensorId;
                const name  = btn.dataset.sensorName;
                const color = sensorColorMap[id] || '#f97316';
                _updateSensorBtnStyle(btn, sensor_selected_set.has(id), color, name);
            });
            const allBtn = document.getElementById('sensor-btn-all');
            if (allBtn) _updateAllBtnStyle(allBtn, sensors);
            return;
        }

        const header = panel.querySelector('p');
        panel.innerHTML = '';
        if (header) panel.appendChild(header);

        // ── ปุ่ม ALL ──
        const allBtn = document.createElement('button');
        allBtn.id = 'sensor-btn-all';
        allBtn.type = 'button';
        _updateAllBtnStyle(allBtn, sensors);

        allBtn.addEventListener('click', () => {
            const validIds = Object.entries(sensors)
                .filter(([, r]) => r?.monitor_id && r.unit !== '--')
                .map(([, r]) => String(r.monitor_id));

            const allSelected = validIds.every(id => sensor_selected_set.has(id));

            if (allSelected) {
                sensor_selected_set.clear();
                if (validIds.length > 0) sensor_selected_set.add(validIds[0]);
            } else {
                validIds.forEach(id => sensor_selected_set.add(id));
            }

            panel.querySelectorAll('button[data-sensor-id]').forEach(btn => {
                const id   = btn.dataset.sensorId;
                const name = btn.dataset.sensorName;
                const color = sensorColorMap[id] || '#f97316';
                _updateSensorBtnStyle(btn, sensor_selected_set.has(id), color, name);
            });

            if (_sensors_cache) {
                Object.entries(_sensors_cache).forEach(([name, row]) => {
                    if (!row?.monitor_id || row.unit === '--') return;
                    const card = document.getElementById(`card-${name}`);
                    if (card) _updateCardSelectedStyle(card, name, row, sensor_selected_set.has(String(row.monitor_id)));
                });
            }

            _updateAllBtnStyle(allBtn, sensors);
            if (_sensors_cache) renderSensorGraph(_sensors_cache);
        });

        panel.appendChild(allBtn);

        const hr = document.createElement('div');
        hr.style.cssText = 'width:100%;height:1px;background:#e7e5e4;margin:0.2vh 0;';
        panel.appendChild(hr);

        // ── ปุ่ม sensor แต่ละตัว ──
        Object.entries(sensors).forEach(([name, row]) => {
            if (!row?.monitor_id || row.unit === '--') return;
            const id      = String(row.monitor_id);
            const color   = sensorColorMap[id] || '#f97316';
            const isChecked = sensor_selected_set.has(id);

            const btn = document.createElement('button');
            btn.id = `sensor-btn-${id}`;
            btn.dataset.sensorId = id;
            btn.dataset.sensorName = name;
            btn.dataset.color = color;
            btn.type = 'button';

            _updateSensorBtnStyle(btn, isChecked, color, name);

            btn.addEventListener('click', () => {
                const nowSelected = sensor_selected_set.has(id);
                if (nowSelected) {
                    sensor_selected_set.delete(id);
                } else {
                    sensor_selected_set.add(id);
                }
                _updateSensorBtnStyle(btn, !nowSelected, color, name);

                const card = document.getElementById(`card-${name}`);
                const rowData = _sensors_cache?.[name];
                if (card && rowData) _updateCardSelectedStyle(card, name, rowData, !nowSelected);

                _updateAllBtnStyle(allBtn, sensors);
                if (_sensors_cache) renderSensorGraph(_sensors_cache);
            });

            panel.appendChild(btn);
        });
    }

    function _updateAllBtnStyle(btn, sensors) {
        const validIds = Object.entries(sensors)
            .filter(([, r]) => r?.monitor_id && r.unit !== '--')
            .map(([, r]) => String(r.monitor_id));
        const allSelected = validIds.length > 0 && validIds.every(id => sensor_selected_set.has(id));

        if (allSelected) {
            btn.style.cssText = `display:flex;align-items:center;justify-content:center;gap:0.3vw;width:100%;padding:0.3vh 0.4vw;border-radius:0.5vw;border:1.5px solid #f97316;background:#f9731622;cursor:pointer;transition:all 0.15s;`;
            btn.innerHTML = `<span style="font-size:0.55vw;font-weight:800;color:#f97316;letter-spacing:0.05em;">ALL ✓</span>`;
        } else {
            btn.style.cssText = `display:flex;align-items:center;justify-content:center;gap:0.3vw;width:100%;padding:0.3vh 0.4vw;border-radius:0.5vw;border:1.5px dashed #d4d4d4;background:transparent;cursor:pointer;transition:all 0.15s;`;
            btn.innerHTML = `<span style="font-size:0.55vw;font-weight:700;color:#a8a29e;letter-spacing:0.05em;">ALL</span>`;
        }
    }

    function _updateSensorBtnStyle(btn, isSelected, color, name) {
        if (isSelected) {
            btn.style.cssText = `display:flex;align-items:center;gap:0.3vw;width:100%;padding:0.3vh 0.4vw;border-radius:0.5vw;border:1.5px solid ${color};background:${color}22;cursor:pointer;transition:all 0.15s;`;
            btn.innerHTML = `<span style="width:0.5vw;height:0.5vw;border-radius:50%;background:${color};flex-shrink:0;"></span><span style="font-size:0.55vw;font-weight:700;color:${color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:5vw;">${name}</span>`;
        } else {
            btn.style.cssText = `display:flex;align-items:center;gap:0.3vw;width:100%;padding:0.3vh 0.4vw;border-radius:0.5vw;border:1.5px solid #d4d4d4;background:transparent;cursor:pointer;transition:all 0.15s;`;
            btn.innerHTML = `<span style="width:0.5vw;height:0.5vw;border-radius:50%;background:transparent;border:1.5px solid #a8a29e;flex-shrink:0;"></span><span style="font-size:0.55vw;font-weight:600;color:#a8a29e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:5vw;">${name}</span>`;
        }
    }

    // ===== renderSensorGraph — render กราฟตาม sensor ที่เลือก =====
    function renderSensorGraph(sensors) {
        if (!sensors) return;

        const titleEl    = document.getElementById('title-graph-sensor');
        const subtitleEl = document.getElementById('title-graph-sensor-sub');
        const canvas     = document.getElementById('TrendChart');
        if (!canvas) return;

        const sw       = window.innerWidth;
        let   fontSize = 9;
        if (sw >= 3840) fontSize = 18;
        else if (sw >= 1920) fontSize = 12;
        const ptRadius = sw >= 3840 ? 4 : 2;

        const isDark    = document.documentElement.classList.contains('dark');
        const tickColor = isDark ? '#a8a29e' : '#78716c';

        const selectedIds = new Set([...sensor_selected_set].map(id => String(id)));

        if (selectedIds.size === 0) {
            const row = Object.values(sensors).find(s => String(s.monitor_id) === String(sensor_select));
            if (!row || !row.logs?.length) return;
            _renderSingleLine(row, canvas, titleEl, subtitleEl, fontSize, ptRadius, tickColor);
            return;
        }

        const datasets   = [];
        const titleNames = [];
        let   allLabels  = [];

        Object.entries(sensors).forEach(([name, row]) => {
            if (!row?.monitor_id) return;
            if (!selectedIds.has(String(row.monitor_id))) return;

            const logs = row.logs || [];
            const labels = logs.map(p => {
                const d = new Date(p.createtime);
                return isNaN(d.getTime())
                    ? String(p.createtime || '')
                    : `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            });
            if (labels.length > allLabels.length) allLabels = labels;

            const color = sensorColorMap[String(row.monitor_id)] || '#f97316';
            const values = logs.map(p => { const v = parseFloat(p.data_value); return isNaN(v) ? null : v; });

            titleNames.push(name);
            datasets.push({
                label:                `${name}${row.unit ? ' (' + row.unit + ')' : ''}`,
                data:                 values,
                borderColor:          color,
                backgroundColor:      color + '22',
                borderWidth:          2,
                pointRadius:          ptRadius,
                pointHoverRadius:     ptRadius + 2,
                pointBackgroundColor: color,
                tension:              0.4,
                fill:                 false,
                spanGaps:             true,
            });
        });

        if (datasets.length === 0) return;

        if (titleEl)    titleEl.textContent    = 'แนวโน้มค่า ' + titleNames.join(' / ');
        if (subtitleEl) subtitleEl.textContent = titleNames.join(' | ') + ' Historical Data';

        const allVals = datasets.flatMap(d => d.data).filter(v => v !== null);
        let yMin = Math.min(...allVals); yMin -= Math.abs(yMin) * 0.05;
        let yMax = Math.max(...allVals); yMax += Math.abs(yMax) * 0.05;

        if (typeof sensorChart !== 'undefined' && sensorChart) {
            sensorChart.destroy();
            sensorChart = null;
        }

        sensorChart = new Chart(canvas, {
            type: 'line',
            data: { labels: allLabels, datasets },
            options: {
                responsive:          true,
                maintainAspectRatio: false,
                interaction:         { mode: 'index', intersect: false },
                plugins: {
                    legend: {
                        display:  datasets.length > 1,
                        position: 'top',
                        labels:   { font: { size: fontSize - 1 }, boxWidth: 10, padding: 6, color: tickColor }
                    },
                    tooltip: {
                        mode:      'index',
                        intersect: false,
                        callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(2) ?? '-'}` }
                    }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { font: { size: fontSize }, color: tickColor, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 } },
                    y: { min: yMin, max: yMax, ticks: { font: { size: fontSize }, color: tickColor, callback: v => v.toFixed(1) }, grid: { color: 'rgba(0,0,0,0.05)' } }
                }
            }
        });
    }

    function _renderSingleLine(row, canvas, titleEl, subtitleEl, fontSize, ptRadius, tickColor) {
        const labels = row.logs.map(p => {
            const d = new Date(p.createtime);
            return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        });
        const values = row.logs.map(p => parseFloat(p.data_value));
        const min    = Math.min(...values) * 0.95;
        const max    = Math.max(...values) * 1.05;

        if (titleEl)    titleEl.textContent    = 'แนวโน้มค่า ' + row.monitor_name;
        if (subtitleEl) subtitleEl.textContent = 'Historical ' + row.monitor_name + ' Data';

        if (typeof sensorChart !== 'undefined' && sensorChart) { sensorChart.destroy(); sensorChart = null; }

        sensorChart = new Chart(canvas, {
            type: 'line',
            data: {
                labels,
                datasets: [{ data: values, borderColor: '#ff8021', backgroundColor: 'rgba(255,128,33,0.1)', tension: 0.4, fill: true, pointRadius: ptRadius, pointBackgroundColor: '#ff8021' }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y.toFixed(2)}` } } },
                scales: {
                    x: { grid: { display: false }, ticks: { font: { size: fontSize }, color: tickColor, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 } },
                    y: { beginAtZero: true, min, max, ticks: { font: { size: fontSize }, color: tickColor, callback: v => v.toFixed(1) }, grid: { color: 'rgba(0,0,0,0.05)' } }
                }
            }
        });
    }

</script>
