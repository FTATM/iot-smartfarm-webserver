    async function Card4() {
        let table = [];

        try {
            const res = await fetch('../../api-website/fetch_expenses.php?bid=' + branchID);

        const categoryMapex = {};
        const categoryMapin = {};

        expense.forEach(item => {
            if (!categoryMapex[item.category_id]) {
                categoryMapex[item.category_id] = 0;
            }
            categoryMapex[item.category_id] += Number(item.amount);
        });
        income.forEach(item => {
            if (!categoryMapin[item.category_id]) {
                categoryMapin[item.category_id] = 0;
            }
            categoryMapin[item.category_id] += Number(item.amount);
        });

        const sortedex = Object.entries(categoryMapex)
            .sort((a, b) => b[1] - a[1]);

        const totalin = Object.values(categoryMapin)
            .reduce((sum, value) => sum + value, 0);

        const totalex = sortedex.reduce((sum, c) => sum + c[1], 0);
        const top5ex = sortedex;
        // const top5ex = sortedex.slice(0, 5);

        SetValueInHTMLById('card-4-expense', '฿' + totalex);
        SetValueInHTMLById('card-4-income', '฿' + totalin);
        SetValueInHTMLById('card-4-remain', '฿' + (totalin - totalex));

        const listEl = document.getElementById("card-4-list");

        listEl.innerHTML = "";

        top5ex.forEach((item, index) => {

            const categoryId = item[0];
            const amount = item[1];
            const percent = ((amount / totalex) * 100).toFixed(1);

            let categoryName = categories.find(c => c['id'].toString() == categoryId.toString())?.name || "--";

            listEl.innerHTML += `

                    <div class="w-[1.5vw] h-[1.5vw] rounded-full flex items-center justify-center font-bold text-white text-[0.5vw]" style="background-color:${colors[index]}">

                    </div>
                </div>

                    <p class="text-[0.4vw] text-slate-400">${percent}%</p>
                </div>
            </div>
            `;
        });
    }



    // ===== BUILD DOTS จาก DB (dynamic เหมือน indoor) =====
    function buildDots(rows) {
        const dotRow = document.getElementById('dot-row');
        const labelRow = document.getElementById('label-row');
        if (!dotRow || !labelRow) return;

        dotRow.innerHTML = '';
        labelRow.innerHTML = '';

        const isTV = window.innerWidth >= 3840;
        const minItemWidth = isTV ? 100 : 50;
        const labelFontSize = isTV ? '24px' : '8px';
        const dotSize = isTV ? '48px' : '20px';
        const numFontSize = isTV ? '18px' : '8px';

        const totalMinWidth = rows.length * minItemWidth;

        ['dot-row', 'label-row'].forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            el.style.minWidth = totalMinWidth + 'px';
        });

        rows.forEach((row, i) => {
            // === DOT ===
            const dotWrap = document.createElement('div');
            dotWrap.style.cssText = `
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    min-width: ${minItemWidth}px;
    max-width: ${minItemWidth}px;
    padding: 0 ${isTV ? 16 : 4}px;
    box-sizing: border-box;
`;

            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.dataset.index = i;
            dot.style.cssText = `
            width: ${dotSize};
            height: ${dotSize};
            border-radius: 50%;
            border: 2px solid #ddd;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        `;

            const num = document.createElement('span');
            num.className = 'dot-num';
            num.style.cssText = `font-size: ${numFontSize}; font-weight: 500; color: #888;`;
            num.textContent = i + 1;

            dot.appendChild(num);
            dotWrap.appendChild(dot);
            dotRow.appendChild(dotWrap);

            // === LABEL ===
            const labelWrap = document.createElement('div');
            labelWrap.style.cssText = `
    text-align: center;
    flex: 1;
    min-width: ${minItemWidth}px;
    max-width: ${minItemWidth}px;
    padding: 0 ${isTV ? 8 : 2}px;
    box-sizing: border-box;
    overflow: hidden;
`;

            const lbl = document.createElement('span');
            lbl.className = 'label';
            lbl.dataset.index = i;
            lbl.style.cssText = `
    font-size: ${labelFontSize};
    font-weight: 300;
    color: #888;
    white-space: normal;
    word-break: break-word;
    display: block;
    text-align: center;
    line-height: 1.3;
`;
            lbl.textContent = row.d_value;

            labelWrap.appendChild(lbl);
            labelRow.appendChild(labelWrap);
        });

        // scroll ถ้าเบียด
        const scrollContainer = document.querySelector('#panel1-2 > div');
        if (scrollContainer) {
            const wrapper = document.getElementById('panel1-2');
            const wrapperWidth = wrapper ? wrapper.offsetWidth : 300;
            if (totalMinWidth > wrapperWidth) {
                scrollContainer.style.overflowX = 'auto';
                scrollContainer.style.paddingBottom = '4px';
            }
        }
    }

    // ===== SET ACTIVE (scoped ใน panel1-2) =====
    function setActive(index, totalRows) {
        const container = document.getElementById('panel1-2');
        if (!container) return;

        const dots = container.querySelectorAll('.dot');
        const nums = container.querySelectorAll('.dot-num');
        const labels = container.querySelectorAll('.label');
        const fill = document.getElementById('fill-bar');

        const total = totalRows || dots.length;
        const pct = total <= 1 ? 0 : (index / (total - 1)) * 100;

        const color = '#639922';
        const textColor = '#27500A';

        const isTV = window.innerWidth >= 3840;
        const normalSz = isTV ? '48px' : '20px';
        const activeSz = isTV ? '56px' : '24px';
        const lblFont = isTV ? '24px' : '8px';

        dots.forEach((dot, i) => {
            const num = nums[i];
            if (i < index) {
                dot.style.background = color;
                dot.style.borderColor = color;
                dot.style.width = dot.style.height = normalSz;
                num.style.color = '#fff';
            } else if (i === index) {
                dot.style.background = color;
                dot.style.borderColor = color;
                dot.style.width = dot.style.height = activeSz;
                num.style.color = '#fff';
            } else {
                dot.style.background = '#fff';
                dot.style.borderColor = '#ddd';
                dot.style.width = dot.style.height = normalSz;
                num.style.color = '#888';
            }
        });

        labels.forEach((lbl, i) => {
            lbl.style.fontSize = lblFont;
            if (i === index) {
                lbl.style.color = textColor;
                lbl.style.fontWeight = '700';
            } else if (i < index) {
                lbl.style.color = color;
                lbl.style.fontWeight = '500';
            } else {
                lbl.style.color = '#888';
                lbl.style.fontWeight = '300';
            }
        });

        if (fill) {
            fill.style.background = color;
            fill.style.width = pct + '%';
        }
    }

    setActive(0);

</script>
