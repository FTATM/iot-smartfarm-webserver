<!-- JavaScript -->
<script>
    let currentData = null;
    let interval = null;
    let timeInterval = 5;
    let isLoading = true;
    let monitors = [];
    let manualSelectDevice = {};

    document.addEventListener('DOMContentLoaded', async () => {
        await process();
        init();
        isLoading = false;

    });

    function init() {
        const EtimeInterval = document.getElementById('time-interval');
        if (!EtimeInterval) {
            console.warn("Not found Element 'time-interval. please check and try again.'");
            return;
        }

        EtimeInterval.value = timeInterval ?? 5;

        EtimeInterval.addEventListener('change', () => {
            const value = Number(EtimeInterval.value);

            if (!Number.isInteger(value) || value < 1 || value > 100) {
                console.warn("Please input only INT (integer) between 1 and 100");
                EtimeInterval.value = timeInterval; // กลับค่าเดิม
                return;
            }

            timeInterval = value;
        });

        const deviceCount = document.getElementById('devices-count');
        if (!deviceCount) {
            console.warn("Not found Element 'devices-count'. please check and try again.");
            return;
        }
        deviceCount.textContent = monitors.length;

        bindEvents();

        function bindEvents() {
            const info = document.getElementById("sim-info");

            [
                "min",
                "max",
                "base",
                "pull",
                "step",
                "noise"
            ].forEach(name => {

                const input = info.querySelector(`#sim-${name}`);

                input.addEventListener("input", () => {
                    if (!currentData) return;

                    currentData[`sim_${name}`] = Number(input.value);
                });
            });
        }
    }

    function toggleSimulate() {
        const switchRun = document.getElementById('switch-run');
        if (switchRun.checked) {
            CreateInterval();
            return;
        }
        else {
            clearInterval(interval);
            interval = null;
            console.log("Clear interval Success!");
        }
    }

    async function CreateInterval() {
        if (interval) {
            clearInterval(interval);
            interval = null;
            console.log("clear interval for wait new it.");
        }

        if (!interval) {
            console.log("Set interval (" + timeInterval + "s) Success!");
            await deviceSimulateWorking();
            interval = setInterval(async () => {
                await deviceSimulateWorking();
            }, (timeInterval * 1000));
        }
    }

    async function process() {
        await loadDevices();
        generateDeviceListPanel('devices-list', monitors);
        generateMonitorOption('devices-list-m', monitors, false);
        addeventManualSelectDevice();
    }

    async function loadDevices() {
        const res = await fetch('../../api-website/fetch-config-simulate.php?bid=' + branchID);
        const raw = await res.json();
        const data = raw['data'] ?? [];
        monitors = data;
    };

    function generateDeviceListPanel(id, data) {
        let list = document.getElementById(id);
        list.innerHTML = '';

        if (!Array.isArray(data)) {
            data = Object.values(data);
        }

        data.forEach(row => {
            let div = document.createElement('div');
            div.className = 'flex items-center p-3 border-b border-outline-variant hover:bg-surface-container transition-colors cursor-pointer';
            div.innerHTML = `
                <input ${row.is_sim == 1 ? "checked" : ""} class="device-checkbox w-4 h-4 rounded border-outline text-primary focus:ring-primary" type="checkbox" 
                    data-id="${row.monitor_id}"
                    data-name="${row.monitor_name}"
                    />
                <div class="ml-3 w-full flex flex-col overflow-hidden">
                    <span class="font-label-md truncate">${row.monitor_name}</span>
                    <div class="w-full grid grid-cols-6">
                        <span class="col-span-1 font-mono-data text-[10px] text-secondary">ID: ${row.monitor_id}</span>
                        <span class="col-span-5 font-mono-data text-[10px] text-secondary">
                            |
                            m:${row.sim_min} 
                            x:${row.sim_max} 
                            b:${row.sim_base} 
                            s:${row.sim_step} 
                            n:${row.sim_noise} 
                            p:${row.sim_pull}
                            |
                        </span>
                    </div>
                </div>
                <span class="material-symbols-outlined ml-auto text-primary text-lg">chevron_right</span>
            `;
            list.appendChild(div);

            div.onclick = () => loadConfigDevice(row);

            const checkbox = div.querySelector('.device-checkbox');

            checkbox.addEventListener('change', (e) => {
                e.stopPropagation(); // กันไม่ให้เปิด loadConfigDevice

                row.is_sim = checkbox.checked ? 1 : 0;

                console.log(row.monitor_name, row.is_sim);
            });
        });
    }

    function loadConfigDevice(data) {
        currentData = data;

        const info = document.getElementById("sim-info");

        info.querySelector("#device-name").textContent = data.monitor_name;

        info.querySelector("#sim-min").value = data.sim_min;
        info.querySelector("#sim-max").value = data.sim_max;
        info.querySelector("#sim-base").value = data.sim_base;
        info.querySelector("#sim-pull").value = data.sim_pull;
        info.querySelector("#sim-step").value = data.sim_step;
        info.querySelector("#sim-noise").value = data.sim_noise;
    }

    function addeventManualSelectDevice() {
        const select = document.getElementById('devices-list-m');
        if (!select) {
            console.warn('not found element id : devices-list-m');
            return;
        }

        select.addEventListener('change', () => loadinfoDevice(select.value));
    }

    function loadinfoDevice(id) {
        let device = monitors.find((m) => { return m.monitor_id == id });
        manualSelectDevice = device;

        setinfoDevice(device);
    }

    function setinfoDevice(data) {
        const div = document.getElementById('device-info');
        let group = div.querySelector('#group_label');
        let device = div.querySelector('#device_label');
        let type = div.querySelector('#type_label');
        let datax = div.querySelector('#datax_label');

        if (!group || !device || !type || !datax) {
            console.warn("not found element for set info please check and try again.");
            return;
        }
        group.textContent = data.group_id;
        device.textContent = data.device_id;
        type.textContent = data.type_id;
        datax.textContent = data.datax_id;
    }

    async function sendDevice() {
        const device = manualSelectDevice;
        console.log(device);

        const simulate_input = document.getElementById('simulate-input');
        if (!simulate_input) {
            console.warn("not found element 'simulate-input' please check and try again.");
            return;
        }

        const simulate_value = simulate_input.value;

        if (simulate_value == null) {
            console.warn("Value not null.");
            return;
        }

        try {
            const res = await fetch('../../api_push_data_by_id_multidata.php', {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify([
                    { monitor_id: device.monitor_id, data_value: simulate_value },
                ])
            });
            const raw = await res.json();
            const result = raw;
            console.log(result);

            logResult(result, `Manual inject VAL: ${simulate_value}. ---> "${result.success ? device.monitor_name : "Missing device select."}"`);
        } catch (e) {

            logResult({ "success": false }, "Exception error : " + e);
        }

        function logResult(data, msg) {
            const now = new Date();

            const result = document.getElementById('result-m');

            result.innerHTML += `
            <div class="p-3 ${data.success ? "bg-green-50 border-l-green-500" : "bg-red-50 border-l-red-500"} border-l-4 rounded shadow-sm">
                <div class="flex justify-between items-start">
                    <span class="font-label-md text-green-700">${data.success ? "SUCCESS" : "FAILURE"}</span>
                    <span class="font-mono-data text-[10px] text-secondary">
                        ${new Date().toLocaleTimeString('th-TH', {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            })}
                        </span>
                </div>
                <p class="font-body-sm ${data.success ? "text-green-800" : "tex-red-800"} mt-1">${msg}</p>
            </div>
            `;
        }

    }

    function randFloat(min, max) {
        return Math.random() * (max - min) + min;
    }

    function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
    }

    function nextValue(m) {

        const current = Number(m.datax_value);

        const trend =
            (Number(m.sim_base) - current) * (Number(m.sim_pull) / 100);

        const step =
            randFloat(-Number(m.sim_step), Number(m.sim_step));

        const noise =
            randFloat(-Number(m.sim_noise), Number(m.sim_noise));

        const newValue = clamp(current + trend + step + noise, Number(m.sim_min), Number(m.sim_max));

        return newValue;
    }

    async function deviceSimulateWorking() {

        const result = [];

        monitorsFilter = monitors.filter((m) => { return m.is_sim == 1; });

        monitorsFilter.forEach((m) => {
            if (!m) return;

            const next = nextValue(m);

            // เก็บค่าใหม่ไว้ใน monitor เพื่อใช้รอบถัดไป
            m.datax_value = next;

            result.push({
                monitor_id: m.monitor_id,
                data_value: Number(next.toFixed(2))
            });
        });

        await pushMonitorData(result);

    }

    async function pushMonitorData(data) {

        if (!Array.isArray(data) || data.length === 0) {
            console.warn("No monitor data to send.");
            return false;
        }

        try {

            const res = await fetch('../../api_push_data_by_id_multidata.php', {
                method: "POST",
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await res.json();

            logResult(
                result,
                result.success
                    ? `Simulate sent ${data.length} monitor(s).`
                    : "Failed to send simulate data."
            );

            return result;

        } catch (e) {

            console.error(e);

            logResult(
                { success: false },
                "Exception error : " + e
            );

            return false;
        }

        function logResult(res, msg) {
            const now = new Date();

            const result = document.getElementById('result-a');
            result.innerHTML = '';

            console.log("---- data ----");
            console.log(data);


            Object.values(data).forEach((d) => {
                const name = monitors.find((s) => { return s.monitor_id == d.monitor_id }).monitor_name;
                result.innerHTML += `
                <div class="flex justify-between font-mono-data text-xs py-1 border-b border-outline-variant/30">
                    <span class="text-secondary">
                        ${new Date().toLocaleTimeString('th-TH', {
                    hour12: false,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                })}
                    </span>
                    <span class="text-on-surface">${name} : ${d.data_value ?? "-"}</span>
                    <span class="text-green-600 font-bold"></span>
                </div>
                `;
            })
        }
    }

    async function updateDeviceList() {

        const payload = monitors.map(m => ({
            id: m.monitor_id,
            is_sim: m.is_sim,
            sim_min: m.sim_min,
            sim_max: m.sim_max,
            sim_base: m.sim_base,
            sim_step: m.sim_step,
            sim_noise: m.sim_noise,
            sim_pull: m.sim_pull
        }));

        try {
            showSaving();

            const res = await fetch("../../api-website/update-config-simulation.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const result = await res.json();

            console.log(result);

            showSuccess();

            await new Promise(resolve => setTimeout(resolve, 1000));

            hideSaving();

        } catch (err) {
            console.error(err);
            hideSaving();
        }
    }

</script>
