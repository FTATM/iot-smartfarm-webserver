<!-- JavaScript -->
<script>
    const chatInput = document.getElementById("chatInput");
    const chatSendBtn = document.getElementById("chatSend");
    const chatMessage = document.getElementById("chatMessages");
    let AI_Mode = null;
    document.addEventListener('DOMContentLoaded', async () => {
        await loadConfig();

        console.log("... AI ready ...");
    });

    async function loadConfig() {
        const res = await fetch('/iotsf/api-website/config-public.php');
        const config = await res.json();

        const aiModelName = config.ai_model.length > 10
            ? config.ai_model.substring(0, 10) + '...'
            : config.ai_model;

        // Model name
        let aiElement = document.getElementById('ai-model-badge');
        if (!aiElement) {
            console.warn("Not found element ai-model-badge");
            return;
        }
        aiElement.textContent = aiModelName;

        // Mode badge
        const modeBadge = document.getElementById('ai-mode-badge');
        if (config.ai_mode === 0) {
            modeBadge.textContent = '🏠 Local';
            modeBadge.className += ' bg-amber-100 text-amber-700 dark:bg-amber-900 dark:text-amber-300';
        } else {
            modeBadge.textContent = '⚡ External';
            modeBadge.className += ' bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300';
        }

        return config;
    }

    loadConfig();

    function chatOnKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            chatSend();
        }
    }

    function chatResize(el) {
        el.style.height = "auto";
        el.style.height = (el.scrollHeight) + "px";
    }

    // 👉 แสดงข้อความ (ปรับ UI ตามของคุณได้)
    function appendMessage(text, role = "user", time = null, isTyping = false) {
        if (!isTyping) {
            // ลบตัวบ่งชี้ "Typing..." ก่อนเพิ่มข้อความใหม่
            const typingIndicator = document.getElementById("typingIndicator");
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }
        // ตัวอย่าง: เพิ่มข้อความลงใน element ที่มี id="chatMessages"
        const messageElement = document.createElement("div");
        messageElement.id = isTyping ? "typingIndicator" : "";
        messageElement.className = `w-full flex ${role === "user" ? "justify-end" : ""} `;
        messageElement.innerHTML = `
            <div class="flex items-end gap-2 ${role === "user" ? "flex-row-reverse" : ""}">
                <div
                    class="w-6 h-6 rounded-full bg-stone-100 dark:bg-stone-800 border border-stone-200 dark:border-stone-700 flex items-center justify-center text-[10px] font-semibold text-stone-500 flex-shrink-0">
                    ${role === "user" ? "You" : "AI"}
                </div>
                <div
                    class="max-w-[78%] px-3 py-2 rounded-2xl ${role === "user" ? "rounded-br-sm" : "rounded-bl-sm"} ${isTyping ? "isTyping" : ""} bg-stone-100 dark:bg-stone-800 text-stone-800 dark:text-stone-100 text-[13px] leading-relaxed">
                    ${text}
                </div>
                ${time ? `<div class="text-[0.65rem] text-stone-500 dark:text-stone-400 mt-1">${time}</div>` : ""}
            </div>
        `;
        chatMessage.appendChild(messageElement);
    }

    async function chatSend() {
        const message = chatInput.value.trim();
        if (!message) return;

        appendMessage(message, "user");
        chatInput.value = "";
        chatResize(chatInput);

        chatSendBtn.disabled = true;

        appendMessage("Thinking...", "AI", null, true);

        // ✅ เริ่มจับเวลา
        const startTime = performance.now();
        let responseTime = 'N/A';
        try {
            const res = await fetch("../../api-website/AI-ask.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: message
                })
            });

            const data = await res.json();
            console.log(data);

            const endTime = performance.now();
            responseTime = ((endTime - startTime) / 1000).toFixed(2);

            if (data.success === true) {
                appendMessage(data.answer, "ai", `${responseTime} sec`);

                // แสดง suggestion ถ้ามี (optional)
                if (data.suggestion && AI_Mode === 0) {
                    appendMessage(data.suggestion, "suggestion", `${responseTime} sec`);
                }
            } else {
                appendMessage("Error: " + (data.message ?? "Unknown error"), "error", `${responseTime} sec`);
            }

        } catch (err) {
            console.error(err);
            appendMessage("Network error", "error", `${responseTime} sec`);
        }

        chatSendBtn.disabled = false;
    }
</script>
