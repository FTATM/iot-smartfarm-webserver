<!-- JavaScript -->
<script>
    let status_script = false;
    let checkInterval = null;

    document.addEventListener('DOMContentLoaded', async () => {
        await process();
        Checkstatus();

        checkInterval = setInterval(Checkstatus, 10000);
    });

    async function process() {
        const data = await loadFiles();
        generateTableLog(data);
    }

    async function loadFiles() {
        let res = await fetch('../../api-website/service-schedules.php');
        let raw = await res.json();
        return raw;
    }

    async function loadDetailFile(date) {
        let res = await fetch('../../api-website/service-schedule-detail.php?date=' + encodeURIComponent(date));
        let raw = await res.json();
        return raw;
    }

    function generateTableLog(data) {
        const _table = document.getElementById('table-Logs');
        if (!_table) { console.warn("[warn] Not found Element id table-Logs"); return; }
        if (!Array.isArray(data) || data.length === 0) {
            console.warn("[warn] No data.");
            return;
        }

        let tbody = _table.querySelector('tbody');
        if (!tbody) {
            console.log("[log] tbody not found.");
            tbody = document.createElement('tbody');
        }

        tbody.textContent = "";

        data.forEach((d) => {
            const Fullname = d.name.split('_')[2];
            const name = Fullname.split('.')[0];
            console.log(name);


            let tr = document.createElement('tr');
            tr.className = "hover:bg-primary-fixed/50 border-l-4 border-l-secondary/20 hover:border-l-primary-container cursor-pointer transition-colors";
            tr.innerHTML = `
                <td class="px-gutter py-4 font-mono-data text-mono-data">${d.name ?? "--"}</td>
                <td class="px-gutter py-4 font-mono-data text-mono-data"> ${Math.round(Number(d.size) / 1000)}KB</td>
                <td class="px-gutter py-4 font-mono-data text-mono-data text-right">${formatDate(d.modified)}</td>
            `;
            tbody.appendChild(tr);

            tr.onclick = () => logTimes(tr, d, name);

            if (d.name == data[0].name) {
                tr.click();
            }
        });
    }

    async function logTimes(r, data, date) {
        const res = await loadDetailFile(date);
        console.log(res);


        const times = document.getElementById('times');
        Object.entries(res).map(([k, v]) => {
            const time = document.createElement('div');
            time.className = "w-full text-center py-1 hover:bg-primary/20 ";
            time.textContent = k;

            times.appendChild(time);

            time.onclick = () => logDetail(v);
            if (k == Object.keys(res)[0]) {
                time.onclick();
            }
        });
    }

    function logDetail(value) {
        const detail = document.getElementById('detail');
        detail.textContent = '';
        Object.values(value).map((v) => {
            const div = document.createElement('div');
            div.innerHTML = `
                <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-lg overflow-hidden shadow-sm">
                    <div class="bg-surface-container px-4 py-2 flex justify-between items-center border-b border-outline-variant/20">
                        <div class="flex flex-col">
                            <span class="text-xs font-bold text-secondary uppercase tracking-wider">
                            Branch[${v.branch_id}]
                            </span>
                            <span class="text-sm font-bold text-on-surface">
                                ${v.branch_name}
                            </span>
                        </div>
                        <span class="rounded-full p-1 text-mono-data bg-on-surface-variant/10 text-on-surface-variant">${v.result ?? '--'}</span>
                    </div>
                    <div class="p-4 space-y-2">
                        <div class="flex items-center gap-2 text-[0.75vw] text-on-surface-variant font-mono">
                            <span class="material-symbols-outlined text-sm">schedule</span>
                            ${v.run_time}
                        </div>
                        <div class="bg-surface-container-low p-3 rounded border border-outline-variant/10">
                            <p class="text-[0.8vw] text-on-surface-variant italic">
                                เหตุผล: ${v.reason}
                            </p>
                        </div>
                    </div>
                </div>
            `;
            detail.appendChild(div);
        });
    }



    //=========== Check script schedule function ==========
    async function toggleScript() {
        if (checkInterval) {
            clearInterval(checkInterval);
            checkInterval = null;
        }

        const startScriptbtn = document.getElementById('start-script-btn');
        const textcontentbtn = startScriptbtn.innerHTML;

        startScriptbtn.disabled = true;

        let action = status_script ? 'stop' : 'start';
        startScriptbtn.textContent = action + 'ing';


        const formData = new FormData();
        formData.append('action', action);
        formData.append('service', 'runtime_schedule');

        const res = await fetch('../../api-website/service-command.php', {
            method: "POST",
            body: formData
        });

        const raw = await res.json();
        console.log(raw);

        Checkstatus();
        startScriptbtn.disabled = false;
        startScriptbtn.innerHTML = textcontentbtn;
        checkInterval = setInterval(Checkstatus, 10000);
    }

    async function resetScript() {
        console.error('Not add function reset contact Administrator and try again later.');
    }

    //interval script check status
    async function Checkstatus() {
        const raw = await serviceCommand('dashboard', 'runtime_schedule');
        status_script = raw.runtime_schedule.service.running;
        const status = raw.runtime_schedule.status;

        console.log(status_script);
        console.log(status);

        const startScriptbtn = document.getElementById('start-script-btn');
        const statusBadge = document.getElementById('statusBadge');
        if (statusBadge) {
            // ล้างสีเดิมก่อน
            const statusbg = statusBadge.querySelector('#statusBg');

            statusbg.classList.remove(
                'text-stone-500',
                'text-red-500',
                'text-green-800',
                'text-orange-800',
                'bg-stone-200',
                'bg-red-200',
                'bg-green-200',
                'bg-orange-200'
            );

            if (status_script) {
                startScriptbtn.querySelector('#actionIcon').textContent = 'stop_circle';
                startScriptbtn.querySelector('#actionText').textContent = 'Stop Script';
                startScriptbtn.disabled = false;
                startScriptbtn.classList.remove('bg-stone-400');
                startScriptbtn.classList.add('bg-primary');
                statusBadge.querySelector('#status').textContent = 'Running';
                statusbg.classList.add('bg-green-800');
                statusBadge.classList.add('text-green-800', 'bg-green-200');
            } else if (!status_script) {
                startScriptbtn.querySelector('#actionIcon').textContent = 'play_circle';
                startScriptbtn.querySelector('#actionText').textContent = 'Start Script';
                startScriptbtn.disabled = false;
                startScriptbtn.classList.remove('bg-stone-400');
                startScriptbtn.classList.add('bg-primary');
                statusBadge.querySelector('#status').textContent = 'Stop';
                statusbg.classList.add('bg-orange-800');
                statusBadge.classList.add('text-orange-800', 'bg-orange-200');
            } else {
                startScriptbtn.querySelector('#actionIcon').textContent = 'circle';
                startScriptbtn.querySelector('#actionText').textContent = 'Error Script';
                startScriptbtn.disabled = true;
                startScriptbtn.classList.remove('bg-primary');
                startScriptbtn.classList.add('bg-stone-400');
                statusBadge.querySelector('#status').textContent = 'Error';
                statusbg.classList.add('bg-red-500');
                statusBadge.classList.add('text-red-500', 'bg-red-200');
            }
        }
        const start = document.getElementById('started_at');
        if (start) start.textContent = status.started_at ?? '--:--:--';
        const update = document.getElementById('updated_at');
        if (update) update.textContent = status.updated_at ?? '--:--:--';
        const last = document.getElementById('finished_at');
        if (last) last.textContent = status.finished_at ?? '--:--:--';


    }

    //helper
    function formatDate(timestamp) {
        if (!timestamp) return "-";

        const date = new Date(timestamp * 1000);

        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');

        const h = String(date.getHours()).padStart(2, '0');
        const i = String(date.getMinutes()).padStart(2, '0');
        const s = String(date.getSeconds()).padStart(2, '0');

        return `${y}-${m}-${d} ${h}:${i}:${s}`;
    }

    function parseJson(value) {
        try {
            value = typeof value === 'string'
                ? JSON.parse(value)
                : value;

            if (typeof value.message === 'string') {
                try {
                    value.message = JSON.parse(value.message);
                } catch (_) { }
            }

            return value;
        } catch (_) {
            return null;
        }
    }

    function prettyJson(value) {
        try {
            value = typeof value === 'string' ? JSON.parse(value) : value;

            Object.keys(value).forEach(key => {
                if (typeof value[key] === 'string') {
                    try {
                        value[key] = JSON.parse(value[key]);
                    } catch (_) { }
                }
            });

            return JSON.stringify(value, null, 2);
        } catch (_) {
            return value == '' || !value ? '-' : value;
        }
    }

</script>
